body:
  text: 芳谷集别集類五元提要臣等謹案芳谷集二卷元徐明善撰明善字志友德興人芳谷其别號也至元中官隆興教授又為江西儒學提舉嘗奉使安南厯聘江浙湖廣三省考試拔黃溍於落卷中蓋亦一時以文學知名之士豫章人物志頗載其事跡而不言有所著文集又稱為鄱陽人頗𠫭錯不合近時顧嗣立選元詩搜採至數百家而亦不及此集蓋其流傳已鮮矣集中有文無詩亦無前後序文凡一百二十篇頗談性理而平易朴實大致雅潔猶為不失先民矩矱者其汪標墓銘一首已缺河南亷訪使吳公墓銘一首全佚又平章董士選三代贈官制三首乃誥命代言之詞明善未嘗官翰林不當有此文考蘇天爵元文類載有董士選三制其文與此正同乃元明善作此必編芳谷集者因見有明善之名遂不加考核而誤收入之者今特加刪削而併為訂正於此焉乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ed53c6fb8c85fdad5216bdf57d4152cb4dcab625d090bfc5e481da7f1c35ba72
