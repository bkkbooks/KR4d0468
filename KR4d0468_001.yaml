body:
  text: 芳谷集卷上元徐明善撰序贈唐君序人日飲五氣以生猶魚之於水不但得於賦受之初而已或謂氣行於天與吾身不相闗者定非精於性命者也古人有見於此窺五緯推稱以考一身休咎往往十得其六七而醇儒莊士或羞稱之非以是為不足信也貴居易以俟命也近嵗科廢士匱率假是以游往往不能精盱江唐君號庭竹士之業旣精而窺步尢精蓋後漢有唐子産者明易詩書春秋而尤好星占其原深逺矣君將假是以游而不能不以醇儒莊士羞稱為病諗於予予曰子游奚病夫士不得兼善久矣方今富貴者不奪不饜或卒以賈禍拜塵炙手者皇皇然所覬或卒不可得若此者滔滔也未有深明其故者君儻推其定分以告之使一一安之若命而人人皆君子矣窮不獨善君殆庶幾而君奚病君曰是則然矣彼若信不及奈何予曰信不及彼終必病之非君病也姑以誠告可也若夫蓬蒿環堵之中有匡坐而弦曳縰而歌者君不必進君之說懼能病君自失而走但記姓名還以告我從軍詩序軍旅有詩尚矣風有小戎無衣雅有采薇出車是也詩言志志帥氣姑即四詩而論其志氣則采薇出車量敵慮勝者也其氣和以平小戎無衣無懼者也其氣剛以決和平者其漸微弱剛決者其究盛彊誦其詩而天下大勢之所趨可知矣曩時東南士峩冠緩帶軍旅事一付老兵久矣不復有横槊之賦余讀羅逹泉從軍詩芒銳粲發必往無懼卓然特異於寛柔之彊夫不狃於習不拘於地者豈非負過人之才者哉先民有言天下治地氣自北而南抑氣機之觸有不自知其然而然者哉功名隨世而就若君者偉矣雖然清廟我將和平之積也剛決者不足進也方今聖朝偃兵尚文比隆三代將不復煩君以軍旅之事矣佘謂君宜抑剛決而進和平以鳴國家之盛此一時也詩云詩云從軍云乎送黄孟博序葉正則稱黄台州詩詞高妙之語非子耕所能乃魯直遺墨散落收拾未盡爾比來豫章聞見台州文墨一二信如水心言恨生晚不及拜之一日孟博黄君過余形臞而神壯氣和而志肅其詩清麗遒切其結字翹踈家雞之雄也問之則涪翁六世諸孫而台州之曽孫於是亦疑非孟博能此乃子耕遺墨散落收拾未盡爾且祖父之望子孫豈不欲其克肖而往往不能肖者何也詩云無念爾祖不能肖者不知念爾今孟博心聲心畫酷肖如此其念祖之勤何如夫如是雖謂子耕今存可也豈必以子耕文墨散落未盡者疑吾孟博哉君不逺數千里來省丘墓悵然有反築桑梓之志語及萱竹荒涼文獻泯落輒涕出悲之斯念也詩與字之工固其麤迹也涪翁蘇從也台州從朱文公游在高弟子之目其學粹矣君念之久矣君返松陽寓所有日來别且徵言蓋余家東湖公君家自出自忠愍而上丘墓故相鄰余秋半當解組即往拜墓下泝明月酌雙井東望候君君尚及從余於彼乎豈其使余獨也乎送李尚書序遹祖至元二十九年春上將征海南島夷命行省具舟楫戈甲弓矢無敢不善於時東南自曩嵗征日本交趾疲於需役由奉命者挾威濟欲所至侵暴民大懼復然往往重足惴不自保而尚書李公寔來温恵謹潔不亟不徐凡取之民者戒郡縣即予直材隨所産不責以無有工用所長不彊所不習時其飲食而巡督之民忘其勞未三月悉具艨艟完堅犀鐵精良軍無乏興人乃大悅嗟夫使曩者奉命者其意慮設施與公不異安得東南兆庶瘡痏至今未合哉易旣濟曰高宗伐鬼方三年克之小人勿用如公者不惟不侵暴之猶恐傷之斯不謂之君子乎聖主於是有合旣濟之義矣公之來也顓軍旅事宜不遑俎豆而朔風夙駕頖宫展敬禮殿進止不失尺度對諸生誾誾觀公之志尚如此又知躬行君子亶出平素而非苟然異於挾私濟欲者之為也竣事還都諸生服公徳美為歌詩以送之而郡文學徐明善為之序周自昭文集序徳老予友臨川周君自昭父胷懐灑落與之處者怨欲自消其長宗濂帑庾不私毫粟凡經訓傳記上下累千年胷蟠不可量數為文如颷至霰集下筆不能自休閒與予共吟事予哦咀末就而君詩成大好大槩不為竒險而新美渾然使讀者如步春風閱韶景桃李之艷蕙蘭之馥映照迎將初無異覩而賞趣自不可盡也唐人謂心正則筆正豈獨筆哉言者心之聲也聲者言之衍也雅正之文必君子能之爾其義趣氣和其趨偭不差其憂歡得失不異其規矩繩墨不犯斯足尚也若君文是也近比以文鳴者往往浮險蕩譎後進靡然尚之蓋人心之變有足慨者豈文當爾耶予文不逮君序不足増文重而君之心予知之夙也世有不求同俗求同理者讀且評焉予言豈虚也哉送李君序英章甫逢掖之士仕州若縣者得行其志鮮焉獨官於學者在守先聖之道模範後學比於他官無所屈志故賢者求自試不為過今鄱陽教諭李君學富行修詞翰人尢賞重余命季弟受學如大匠之於木立就繩墨知其於教事最習也今年余客金陵君不逺千里來㑹提舉李公檄教諭鄱陽以歸夫學富者不獨善其身行脩者必兼淑其鄉守先聖之道模範後學衆咸推君宜為歌詩餞之君徵余言粤自杜子美有廣文官冷之句後之學官率以自名寄不滿之意余意不然夫已人之師也聖賢已之師也孔孟憲言無富貴之澤典謨大訓非温飽之用飯疏飲水陋巷簞瓢萬世之謨無以加焉則官冷宜然自名以寄其不滿者非也今之為學官者其教不能植其志有所撓往往不堪其冷而然或謂鄱陽學舍舟如學廩罄如懼君習聞官冷之說而未果肥於義勝故以前說進風奚必舞雩有芝山之高浴奚必沂水有鄱川之潔雲移花落妙寄悠然春煦物茁冷復何有余他時泝流而返接鄱之士可以知模範望君眉睫可以知志行矣勉旃送王廷瑞序南粤去京師萬里風氣異中州故仕者輒不樂往以余觀之出而仕者豈為身謀哉去天旣逺雨露偏枯宅土最窮蛇鱷暴横同吾胞與無所困極士大夫安得恝然於此皆曰吾不樂逺宦將如逺民何意必有官數千里外如出户庭知有生民之休戚不計一身之便否者矣聖朝一視同仁加恵逺方四牡咨詢接於卉服慎簡使人及其僚佐而王君廷瑞以廉能選為憲幕長余約同僚餞君先往問行期君據巨艦欣然雖童稚皆躍躍有喜色余送逺宦多矣未見如君者此不待下車運籌帷幄出教條而南粤之民悦極而舞如在目中王君賢矣哉余又聞南粤雖號僻遠然食有海之百物果有蕉荔之屬異香奇卉甲於中州居者不覺其陋况君意輕嶺海以惠遠民山君川后效祥致福夫何患之有昔王子貢行卭郲九折坂叱其馭曰驅之君之慷慨此行不猶是耶乃序以送君以賀粤人送李徳隆僉湖北憲司事序天地恒而已矣四時日月終古不息何恒如之故人有恒心官有恒守不可失也一失其恒為巫醫且不可况天吏乎聖朝地跨四海官倍前古慮郡縣不恒牧而賊不恒廉而墨則改立肅政廉訪司以糾治之所以欽天恤民為萬億年永命之本匪徒新其官稱也然人直謂官稱雖新風采猶故何哉余讀書見武王誥孟侯冦攘姦宄曰速由文王作罰刑茲無赦又曰無或刑人殺人然則諸侯果何據乎蓋有天下者慎罰敬刑播告之修類皆如此决非使諸侯弛罰刑也聖明在上其揆一而已矣由此觀之居是官者儻昧斯義易恒心失恒守異時上赫然震怒斥曠敗汰罷軟豈曰或承之羞云矣哉今僉司恒莊李公必不然公清作玉雪明侔水鑑仇奸疾汙出乎天性剪荆棘搏虎兕視之無難故自筮仕至今常為風憲人物稱首余方慨此一時也居是官者往往仍前懦戢新猛曰非我也安得心恒心守恒守者振而興之而公適被璽書光華之遣自今以往貪吏黠胥沛然以為得時者不可以無忌憚矣公嗜吟多快句乃今按行騷國洞庭九奏沅澧衆芳將悉付筆下然不為公願之者欲人知朝廷清明賢使者得以展竭材力不復自晦於文酒間也公在臺幕掾倚以為重故皆榮其遷惜其去至於遂南陔戒養之喜無四牡將父之歎人尤以為榮為歌詩以餞而屬予曰子宜序余聞之孔子得見有恒者斯可矣今幸得見之雖不幸繼今不得親而炙之深幸聖朝克用常人而湖北之民被有恒之福澤也是為序送趙顯之序至元庚寅余教授洪都顯之趙君亦來長郡幕朔朢必宿駕在泮魁岸秀整如雞羣鶴甚異之往時郡博士與郡官僚數往來為綢繆余最簡出未嘗詣君君過余啜苦茗徑去其交疎矣然洪士議於校者詡君清如出一口故知君之深無過余者明年乃同掾行臺又明年中執法以君風裁絶出剡上為浙東憲幕長華其遷而惜其去者不獨余也將行徵言余謂經紀政令歴閲簡書君之職然爾夫洪都仰觀省閤廉車號為繁劇而君獨甚宜其官清之不可已也如是乃今據一道之上游出令而鮮所受令佩素清以往豈不刃游餘地也哉幕中之辨無過而激也無不及而同也惟其是而已若夫截濁浪之奔鯨驅塞道之長豺固有持神斧者異時海右澄清最諸道民曰使者使者曰元僚實善助我丕休哉余言如此則又為詩四韻以倡凡餞君者詩曰三年氊冷豫章城書眼逢君百倍明憲府已倈新掾重籌帷長説舊僚清蒼官挺挺烏同集碧宇迢迢鶚獨橫我合故山看白石相煩洞裏約初平余先世自金華徙分寧故云送李可行光澤縣尹序天下者一邑之積邑有仁令天下之平不難也今之為令者往往以民為贄而達其身以民為飱而飽其家爾不爾者十無一二焉何獨無不忍人之心邪子曰君子學道則愛人今之學道者不多見則溺於利欲而不知人之當愛又何足異哉至元甲子予為吏行臺可行李君實先予言寡而當於理公退唯子朱子集註孔孟曾思之書研朱自勘而已予歎異之因論涵養省察之要為君自此雨屐夜燈相從以講切為事非他人口耳云者予愛敬焉又明年秩滿令閩之光澤行有日求贈言夫為宰在於學道愛人君講習夙矣必與今之為令者異視民如身恐其傷不以為贄視民如家恐其匱不以為飱政平訟理光澤為治邑放之他邑而準天下可平也予何言哉雖然學不可以已愛人仁之一事非復其初之天而全體不息者未仁也涵養省察須臾有間而仁或幾乎息矣然則君有人民社稷之重未若仁以為已任之尤重也君勉乎哉子夏曰仕而優則學此姑愈於得人爵而棄天爵云爾其言有弊不可不察也君之仕自此始予懼君信斯言而學有須臾之間故瀆告云爾送别劉正卿序今之吏所尚者材也明法律銛刀筆鋭於事而給於言凡官長所欲為如手足之奉腹心不待發聲徵色若此者所謂材也然余求之古設官分職以為民極府史胥徒在焉極者標準之名也民望以取正者也則古之吏又未必專以材選矣古之吏不可見若余友劉君正卿則異乎今之吏也異乎今必同乎古故予獲交劉君雖古之吏不可見不恨矣君溫良清慎余嘗詣君見其穉子有恒飢凄凉之色而不以遡人其臨事從容反覆必叶理應法而後止其與人交未嘗一失聲氣然為和非為比也君之徳可尚如此余與君聯曹案牘視君為簡而嘗若不給異時他掾謁告君兼二文書填委披繹決遣不終日硯席蕭然人或慰君賢勞則俛顔微笑示不足説然則君之材亦不可及矣秦誓截截諞言與休休有容此材徳之辨也夫以小戎無衣好戰用兵之俗宜其所尚者材爾及穆公一旦為子孫黎民長遠慮則其言如此夫子序書而進之典謨訓誥之末他時傳大學平天下者又深取之豈不深切著明也哉然則如君者以之綱紀風憲貪汚之所以革以之布宣徳澤困窮之所以蘇信可以為民極也曾謂聖代而使休休有容者陸沈乎哉余知君最深而懼人之知君淺也故序以驗好徳者因以識别書隠詩集序自墳典丘索以來世益遠書益夥仕者雖欲博不暇也必隠者然後能博出處君子之大端經著其義史錄其人論世尚友得仕與隠之權度焉非時冒進者書有不博爾必博者然後能隠隠而書愈博博而隠愈確萬君之號書隠豈苟然哉君又以書之菁華芳潤釀而為詩灑落曠遠有物外之適讀之使人意消彼戰蝸角官蟻柯者欲求一語近似不可得逋野無間然矣或曰身將隠焉用文之萬君書隠而詩鳴何如余曰子推之隠也有怨焉怨而文宜不可萬君動天機之和鳴獨善之樂慨想夫古之求仁得仁者而永言焉雖聲滿江湖使讀者疾愈傳者紙貴非隠之疵也昔人謂皇甫謐書淫當魏晉間終身不仕所著帝王世紀高士傳等書並重於世吾方於萬君有望不特貴其詩而已送劉季和序古者師不往教今往教矣唯童子未能從師於遠則就而教之雖不槪於古尚宜於今也古之弟子有久不省親者師督之今之弟子不越鄉而得師則無久去其親者獨循陔之念為師者自不能忘則反為官守所拘莫遂也然則往教殆不可哉余鄉校有小學官為置師而劉季和實來居數月一旦貌甚戚叩之曰唯親之思也越月告行期曰必親之省也非有督之者也督之者心也心為嚴師其此之謂乎且庭闈之念人心天命之正也拘攣於官守者遏其命之正也今季和躍然於此可與入徳矣季和嘗從余問中庸大㫖余謂此在深體黙識知行並進駕説無益今觀於此然後余之言可出也中庸曰其次致曲曲能有誠先儒謂從其善端發見之偏推而致之以造其極是亦聖人之誠已且舜武王周公之孝根於天命之性者與季和豈有異乎天不異而人殊何尤君勉矣毋足乎一善而弗擴也毋安乎一能而弗進也千能萬善日亹亹焉而不敢已此中庸之㫖也果能此道則生君之前者且將以君為師有講習之説有朋自遠來之樂其視效一官招諸生不猶外物也哉送傅啟心序班史志陰陽二十一家三百六十九篇而談天衍所著百有五篇然則推序五徳考定正朔明國之所尚民之所宜與所忌畏者達之天下昔者非瑰偉奇佹之士不能創而傳之也周末學廢不復取士獨孔孟與其徒不以窮塞易意講學自若降是則往往棄去為諸家相雄長若衍者是已余里傅君啟心儒家流也聖朝方選士為郡縣學官然爭進者彌衆君度在儒伍中未即滿志乃博習陰陽之書郡舉之部使者加察詳焉中其科里之士方幽槁白屋而君行即待詔金馬門君真奇偉之士乎哉異時志陰陽家君當前列矣君將北上來徵言予言如此客有笑於側者曰末哉子之言也昔天以良弼賚商傳注有言自天而降他時又遺世不死麗乎天上今東維箕尾有星晱睒尚髣髴植鰭之狀也其精氣注毓在乃後人寔能以神靈震動中外徑取穹顯復如夢賚則初菴集賢公是已君其宗英又將繼起今子不以瀛州平步為君願而以稷下高談為君儗彼稷下又何足以稱揚哉予亟起謝客曰非所及乃并著客之言為贈敝帚詩集序景定元祐間雲心龍山兩張公出取科第如彗汎畫塗其文旣使人視若兼金萬鎰之重餘事清吟快句揮灑迅逸爭傳寶之余方童子恨不望塵而拜也厥後龍山翁誤比南容辱收愚陋則雲心翁沒已久而其家如坡潁之有小坡則養晦是已日月幾何雲龍俱遠余獨處林下每與君共誦山谷贈張壎箕帚白頭之句未嘗不凄然也君以其蘭畹敝帚集示余徴言余於君蓋如久與蘭居穆然俱化視前後序者發揚蹈厲不一乃復引卷疾讀則又清風脱至鼻觀深省蓋君有亢爽之韻故其詩超而不卑無華腴之習故其詩潔而不塵自科輟以來攻律絶者蠭出君才豪思熟筆陣獨掃後出往往辟易吟社抄傳紙價不知增幾金則君詩真千金矣豈衒敝帚為千金者然余嘗繹敝帚之義蓋不止如諺所云者物無不敝而帚之敝敝於灑掃也詩曰夙興夜寐灑掃庭内尚其敝也又曰弗灑弗掃譏不敝也吾黨之士推此義以朂已而以聖賢貫道之器内以治心若灑掃然隨塵隨掃必敝吾帚可也新若手未觸奚可哉知此則本原之地日新無窮而君之詩益超益潔矣使雨兮灑塵登天兮撫彗昔之滋蘭九畹者如是是以為君願之云送萬伯亨郴州教授序魯衛多君子互鄉難與言以地論人由來遠矣王勃謂洪都地靈人傑余昔忝都授見其俊秀林立溫文重厚如龍溪萬伯亨甫者蓋彬彬焉信乎靈傑也余索居林下七年輒想其人上下其議論江山悠阻一俛仰如再撫焉癸卯冬來京師邂逅伯亨甫余喜可知明年伯亨甫調教授郴州以歸余又益喜夫洪去郴遠常調而且遠余益喜何也郴之為州昌黎嘗稱其山奇變其水清冩又言金銀丹乳橘柚竹箭千章之名材不能獨當奇也其清淑之氣磅礴鬱積必有魁奇忠信才徳之民生其間由是觀之其人地豈下洪都哉以余之不忘洪都知伯亨甫之不戚戚於郴也教授官卑而任重綂緒吾當傳規矩吾當施其或傳而莫吾受施而莫吾承皆難與言之比雖地近其又足喜耶且古者師不往教今命往教雖有魯衛不得擇而處也乃今其師洪都也其徒郴也其傳易受其施易承吾為伯言甫喜而豈徒哉往年余輔使者之安南舟過郴口恨不得窮其州之觀今伯亨甫之往也將寄吾目焉童冠追隨選幽勝搜偉怪願如栁子厚記其山之最者錄以貽我送黃伯善序東南涵濡聖化三十年矣科輟士散賴命教猶古窮鄉陋閭有不怠士之業者必之都授者講焉蓋前輩星稀後生雲變舍是無與言仁義云爾余里居時必詣都授稱弟子韓子有言生乎吾前其聞道也固先乎吾生乎吾後其聞道也亦先乎吾吾師道也曁來京師或告曰新例年五十五以下者不得為州若府教授余為憮然何也余今年五十五自茲以往生乎吾後而聞道先乎吾者吾不得而師之矣可恨也徳無常師而曰常於老也東南數十州之士年與余相若者不少不忍怠業而講於都授者當亦不少豈不與余同其恨也越日黃君伯善來别將歸栝蒼問故則年四十七而未得為都授者也余語以所恨伯善莞爾言曰吾與子皆無庸恨也方周末學廢不復取士然孔孟與其徒弦歌未嘗絶音學非利達媒也矧今崇校命教其曰年未五十五未得教授此謂之姑徐徐云爾吾以其間益懋吾學是吾得也夫子不云乎學也祿在其中矣又今年少為都授君當在弟子列者其人有幾且孔孟曾思以來周程張朱子之書具在求之有餘師而子奚恨也余方欲寛伯善伯善旣善自寛又求寛余兹非所謂聞道先乎吾者邪非所當從而師之者邪然則謂余不當在弟子之列者特以已之謙蓋人也必不然矣余益有恨矣姑次第其語識别送黃景章序中州士大夫文章翰墨頗宗蘇黄蓋唐有李杜宋有二公遒筆快句雄文高節今古罕儷宗之宜矣愛人及木况其子孫自科廢以來是家不絶如縷乃有鳳毛其文家雞其字不逺數千里游中州士大夫之間吾意其交薦并引不待淹久而脫裋褐服青紫也雙井黄景章太史之後也為詩累百餘篇皆有家法字翩翩久當逼真謂予家先公東湖先生太史之自出扣寓所徵言南歸問其來幾時曰久矣問其謁中州名士賢大夫曰徧矣問其遇合何如曰故吾爾噫豈不命也未必若是恝也昔太史初為葉縣尉有詩云俗學近知囘首晚病身全覺折腰難時荆公當國或傳之公公欣然除南京國子學教授荆公於太史非有雅故也今以荆公况士大夫必曰爾何曾比於是然荆公此舉鮮克舉之何也君歸矣在已者可必在人者不可必文章翰墨必求如太史在已者也或欣然或恝然在人者也矧太史忠信孝友所以為文章翰墨之本君尤宜夙夜繼承者也九衢黄塵雙井清風孰為可樂君歸深求其本則人爵其猶外物也哉送姚照微雲夢教諭序自古名人間出震動四方莫盛於蜀而騷賦雄麗被服芳潔又獨擅於楚今嘗觀子虚夸雲夢之事欲一至其處攬拾餘芳儻有行吟澤畔者可與傾盖而衰晚旣後之矣今姚君照微以蜀産選主雲夢教事可喜也初揚雄文以相如為式後怪屈原文過相如乃有反騷廣騷畔牢愁諸作皆儗屈原是為用楚變蜀者君儻有意乎予遲君矣然君職教事教不止此余遲君亦不止此且君亦知夢雲象教事最切否何則析之曰雲曰夢者易八卦之兌澤也合之曰雲夢者易六十四卦之麗澤也易曰麗澤兌君子以朋友講習予故曰於教事最切也學必知致而格物未易盡道非小成而希聖未易言良朋畏友叩質觀摩潤賴相因精藴庶乎並詣也彼索居僅足者猶潢汙之瀦風日守之塵埃生焉視八九百里之雲夢孰得孰失予故願君觀象於雲夢而已矣講詳而習久知致而道成則悲憤感激之思浮夸詭異之文不足以淫吾道徳性命之粹雲夢將洙泗如矣非楚蜀之材可同日語矣予遲君者在此君家有名父乃予所感從習者其以予言質焉學古文㑹規約序士學孔子者也然聖人言近旨逺行中庸人鮮能非有先覺之士講求指示之則雖願學孔子有未易者若子朱子則講求之精而指示之切者也士不當瞿𥅆其學則自朱氏而學孔子宜無間然矣自至元庚寅至大徳乙巳予於江西凡再至何今之士異乎昔之士也浮艷以為詩鈎棘以為文貪苟以為行放心便已以為學是皆畔於聖人而朱子所斥者旣䧟溺不自拔而詆訾以蓋之此果何理哉進賢龔君幼文獨不然昔之士也大學語孟子中庸詩易儀禮凡朱子所講求指示者旣盡心其間而又思與其鄉竒特之士切磋究之次及乎羣經諸子諸史凡所以致吾之知者一日袖其所為規約過予曰願得一言以勉同志予謂講習討論之要省察克治之方旣詳於朱子之書矣君與同志日以是為學唯心專目在奉以周旋知是理之當然責吾身以必然而聖賢可幾也予奚言之贅然予甚憫夫詆訾者君為我告之曰爾盖望朱子之藩而遽云云爾嘗試與於斯約及其門升其堂徐入其室則寳貨之藏金石之奏筦簟之設珍鮮之具美富莫加受用不盡將無所容而喙也已蓋自漢唐以來文學之士表裏若一等是皮膚學者易於掇拾爭慕趨之獨朱子之學欲掇拾其皮膚了無所得及夫洞膏肓徹腧膸之後則發舒中和吟弄光霽詩不浮艷而工元氣淋漓星宿陳列文不鈎棘而傳此猶餘事也用則不器有沛然及物之功不用則不戚有隠然蒼生之望蓋學莫妙於治心學莫優於為已學莫大於治國平天下是之謂綂緒非朱子自為學以彊人也而可輕議乎哉夫知而不以告告而不以實以學為已私者也君子不為也故索言之亦以為畫而不進者勉也送堵濟川序涉世如川行身如舟是故戰戰兢兢如臨深淵君子終身焉易六十四卦終於未濟旣濟而後未濟何也世故無盡以身涉世亦無盡以一日而觀之雞鳴而興暮夜而收酬酢萬變夕而計之無過不及蓋今日濟矣而來日未也以來月來嵗比來日皆然故聖人曰物不可窮也受之以未濟物事物也蓋謂此也所謂行身如舟者何也今夫舟視其柁與其所載柁正載得其平濟矣柁不正載偏重雖欲濟得乎心猶柁也行事猶所載也心不正事偏重失平然而涉世無患者未之有也蓋濟川之道盡此矣堵君濟川甚賢而文從管楊二御史巡治江西南粤還臺來使告曰子不能言於吾行邪吾叙堵君之賢且文而止也必非堵君所望於予也果堵君不以是望予而予又有以朂君可謂兩得之也乃推明夫川之所以濟否者序以贈之君勗乎哉予老矣將歸休乎鹿坡之下疏線泉放芥舟以為樂他日聞有龍驤萬斛乗長風破巨浪使良弼舟楫不得専美者必君也夫送王仲温湖廣省郎中序元貞元二年予吏行臺始識王公仲温氷清而玉剛風裁肅然貪惰落膽真御史也予歸休林下有年大徳乙巳甫以憲司掌故來江西而公亦以是年來長省幄客有過予者曰王公潔介絶俗剛直守法每獨行一意唯風憲可矣今為省元僚與宗臣近戚參可否撓所守以為同必不為標所守以為異將不安則公之久速與所屬吏民蒙恵澤與否未可知也久之則又過予曰王公不可及也行中書之務劇矣公正言婉導黙贊顯拂能使私不病公情不傷法相臣之名美而政之出皆平王公之志伸而恵之施不難嵗逢大饑興發靡遲羸尫碩肥流逋目歸戢戈櫜弓姦宂消伏爰自江介達於海陬單行獨憩罔有怵戒丕休哉吳粤之人相慶未始有也吾疇昔之言過矣孔子曰君子和而不同周書曰必有忍其乃有濟昔誦而今見矣客出予欣然久之然未嘗以語公也明年璽書命公改佐湖廣省於是兩道師牧守令吏民士大夫之賢惜公去皆愁騷失據如不終日則客之言其弗信矣乎予觀於古晏平仲叔向子産之倫以善調揉諸侯世卿使無失政而愛直恵利洽於國人載在方冊後世唶唶謂不可及以王公能事觀之何不及之有哉乃序客語送公以賀荆粤且願公施之朝廷而天下與其賜也送醫教授方實恵序民有瘼必有醫孰能醫之曰唯仁者能醫之然今之仕者不學此久矣仁之事孰近曰醫最近然則以醫師理民可乎曰若周攷徳行道藝漢舉孝㢘對䇿由此選者以素所講求為設施視民疾苦無不在已而何民瘼之有若魏雜用厮役為令宰則朘民膏血使不聊生固其宜也以醫師理民不猶愈哉今江浙行省以親民薦饒州路醫教授方君方君之學在活人其措心積慮唯人之濱於死是懼推是心以理人於人必有所濟其舉也誠當矣方君家故儒至君以親病故兼讀歧黄之書乃深入微奥人謂君實恵君因以自號其胷懐可以質神明比縣旁州之疾疢不之他醫皆之君惟恐失君也其不負所舉也必矣醫猶函人也若厮役則矢人也使理民者悉出於徳行道藝孝廉對䇿則行省之舉方君為過矣不盡然則進方君而班於令宰之間必有賢於彼者矣方君之之京師也人皆韙省府之舉能選部之陟明且幸方君之實恵而今而後不止於刀圭匕劑之近小也多為歌詩餞之來豫章更求贈言乃序其大槩如此而告之曰聖朝求民之瘼極矣豈有醫能治之而不使送李貴徳大庾縣教諭序明通之子貴徳李君温栗如玉進退成規矩言論簡而文聖賢之質也來豫章齋榻幽獨儉約檢束後進範之矣提學異而舉之憲司試可省檄教大庾歸待次過予徵言子生何其祥家庭坐軻愈予將叩異聞於子而予何言然予聞南安治大庾即周子二程子講習地也子之質可聖賢子之職在教人以聖賢所講習者舍三先生何以哉夫學以明道而學無逺自視聽言動勿非禮至動容周旋中禮不外乎一身文以載道而文無竒六經之作其人與其時爾踈也然推繹其書之言則猶之一人之言而已舍是無以勗子矣質可以聖賢而學迷夫綂緒猶之徑尺之璧析而為博瓊十㝷之棟斲而為櫑具也可無懼哉予於江西凡再至其士多以已所便為學以小異為文三先生之道彼或敢訾畔其習之痼則囂譁之思盎背利欲之意突人人復望其眉睫而厭斁之使畢用於世十必八九敗矣至於藻繪鈎棘以為異者一皆義禮之外觀者不足以畜徳小兒輩或嗜之終當待之風牆雨壁敗醬之冪爾貴徳思有以易其習慎勿為所易可也昔葉正則信三先生之道不及同時朱吕二公之篤也然祠記有確論焉石今無恙貴徳暇日摩挲讀之退又取三先生之書讀之他日教我以所自得者送陳子實郴州教授序大徳丁未夏五聖天子嗣無疆大歴服推恩八表爰及多士綸言誕敷士如墜顛崖得千丈縻如患重痼得萬金藥更生之賜也雖然貴肆其身者上之仁新美其習者士之事必人人有士君子之行不可徒喜樂之而已此則提學職教者所當汲汲也愚方歎教授鮮有能以身範人者而盱江陳君子實適被命教授郴州若子實者其能作新必矣作新貴乎實踐履實也講課虚也如屋室焉棟梁榱桷一皆堅良而後赤白炳明則可以庥人而除風雨苟其屋之材率中蠧内腐而徒丹雘其外豈所謂新也子實行不愧古人其學博而深矣是行也將攄其所藴積吾知其與不模不範者異也維郴以佳山水重昔瑩中伯修二陳公以直道正諫辱居之而山水又以二公重今子實以平日知行之實與其州之士講貫步趨使人有士君子之行則其流風遺思亦將配二公以不磨滅豈不盛哉若夫教孚俗革聲實流聞清資華秩人為子實願之者不贅言焉寜州志序昔漢定四海獨魯不下欲引天下兵屠之為其守禮義卒使之自下夫魯特以羽分地非有世徳可懐也而魯人不輕去就如此君子哉聖朝奄甸東南江之西唯分寧不即下聖天子寛仁卒使之自下當時官吏頗追尤其人豈識有天下者植天常而聖人一揆邪故初特置州二寧之上而民弗便者官吏構言令宰不足以鎮而請之也後即分寧為州不特置者以便民也州昔為縣有志志燬州人陳君孔哲念舊志其先世所撰也且今為州宜有志則奮為之首疆域訖人物凡三十卷鈎參互驗文不靡蔓質不藁略一州之史也於是上接孫吳而善志專陳氏矣志成以書來曰使邦人考風俗企前聞也敢以序發請予聞分寧在太山長谷之中隂陽降升寒暑代易比他州或少異生其間者氣質不盡同由今觀之固已桀視流靡而厚於義矣州昔為邑蕞爾然文章宗四海行義表當世忠節映千古志不一書州人襲其聲猷一其趨向充其去就取舍之正而歸諸道徳性命之純則身足以善風俗而風俗不得以病其身學足以美世運而世運不得以移其學禮行之孫出之沐浴膏澤為今日周公伯禽之魯此邦家之光也明善其先州人也嘉陳君載筆之勤而尤嘉其望州人之厚也乃為序其端云送黄君序昔荀季和見黄叔度曰子吾之師表也時叔度年十四已入師表之目予方慨世無斯人而高安教諭黄君過予頴邁粹温如犀株玉樹瑩絶塵土蓋寺簿公之孫涪山公之子文燈親傳書脉自春一旦試有司範後學予敬愛之政如季和之見叔度也夫教諭云者非戴記所謂教以事而喻諸徳者乎謂之事者非空言也夫子無行而不與二三子是也徳者人之所得於天師非能有所付畀増益之使自喻其所得而已孟子謂以其昭昭使人昭昭是也徳喻於心事軌於身故師道立則善人多而天下受其賜彼講說之扶疎記問之誇衒師道不此乎在彰彰明也漢承周衰及秦滅學之餘百氏雜家與聖人之道並傳學者罕能治心養性知道徳之要而叔度獨有得於此其言論風旨無所傳聞然能使恃才傲世者勞於瞻忽志清當世者消其鄙吝史稱其隤然處順淵乎似道若及門於孔子殆庶幾乎此豪傑特起之士百世之師季和之稱豈虚也哉予是以為君願之君之過予也不彼求贈言顧予言不足薦也君家所有更贈君疎齋盧公文後集序易坤為文而書云天命弗僭賁若草木草木麗乎坤者也春流八埏華映九州雕葩傳色錦重綺錯掇而視之無遺巧焉夫天命即理也斯文理之形著也或者執枯槁以疑穠灼曰理不若是弗思耳矣夫子之言文曰炳曰蔚曰煥曰郁又曰言之無文行之不逺文不賁若乎哉涿郡疎齋盧公天才竒逺評古今文得失如金合範矢破的又絶識也凡為文盡棄古今拙陋之意雖抽英搴藻窮極絢粲而與化工侔巧不失自然兹為妙矣咨諏所至又詩城騷國江山澄麗蘭茝芳潔楚辭晉句領擥未盡若有待也乃游心放目而盡得之故篇什尢超嘗一入翰林復擢外使逢衣之士咸謂宜在朝廷𢎞文佐理必能聳聖代於唐漢之上以追煥郁之盛不但名一家言賁若於儒林文苑而已也公文自為序而明善弟嘉善得公近藁刋為别集疇昔公嘗謂明善曰子知吾文焉得無一言乃識其大槩於集端云送葉士心序至大庚戌卦直姤之月丹泉葉君恵然谷中徵言將北遊予不復辭蓋六合同軌旣歴三紀東南士何可不北遊也予讀禹貢凡建炎後諸解者於河濟與夫積石龍門逾河諸山疏其決復伏見脈絡面勢或不合行不踰淮故也君學旣該洽於數徃知來仰觀俯察一皆務造其極則兹遊何可已也又有不可已者君曩年之宣城部使者援郭子儀例字君以君名予為說祝君志道在思無邪君從祝規不忘方徯得輿俄枉覆盆可謂無妄之災矣夫有無妄之災亦有無妄之吉无妄曰无妄往吉則兹遊其可已乎直不疑長者也馬周王佐才也以盜金棄不疑則破吳楚之功不立矣以嵗月資格待馬周則以明佐聖之美不彰矣在朝之毁有明之者逆旅之困有亨之者長材素履不可冺沒如此斡流而遷或推而還屈伸之相代也遇合之不期也銷熄誣謾發揮藴抱其不在兹遊也哉豈但有得於山河之壯觀而已哉太𤣥之遇以象姤也次五曰田遇禽人莫之禁測曰田遇禽誠可勉也釋者謂猶士遇知已多得天禄無禁止也君行矣以其時占之則可矣故以无妄之初九遇之次五為君勉野嘯吟槀序山房王君吟成集題曰野嘯夫嘯著於詩於春秋戰國漢魏而晉人尤尚之發妙聲於丹唇激哀音於皓齒飄遊雲於太清集長風於萬里誦此則嘯若可得而聞也善嘯者莫若王世將倚柁樓神氣甚逸則嘯故山房君家聲也今而野也何居世將殺徵士皇甫方囘犯清議附處仲失臣節山房君野嘯蓋貴野鶩意也得之矣雖然嘯可野也王仲宣詩為刪後一大宗昔人稱為五言冠冕詩不可以野則舍仲宣安倣哉劉越石善嘯而詩有清拔氣評者謂原於仲宣山房君仲宣其詩而越石其嘯則吟嘯兩得之斯稱其集之名矣集中多佳句諷味旣屬饜至於妙響動林壑如數部鼓吹者暇日當箕坐山房商略終古以請送胡君序歙胡君郁文親喪未竁語及輒澘然予家方左嚬右吟稱貸四出助之不能多也君重請曰親喪固所自盡然不肖孤釁即罰重天不須暇之連二嵗失二親痛鉅力難欲不鳴號於人不可得願重扳子一言儻有哀之者予辭再三而君弗舍則思夫凡民有喪匍匐救之此言何謂也歧人我而言則我於胡君無與也泝乾父坤母而言則我於胡君豈不猶兄弟也哉乾坤以生物為心人得乾坤此心以為心故惻隠之端在人均有而尢易動其推則先胞而後同與怨婦之詩流出天理曰凡民者豈必鄉鄰但耳目所接救之不敢緩也若郭元振范堯夫是已放諸四海此心同此理同而逆謂未必有斯人者則予不獨胡君之罪人也力有餘有不足與有豐有殺奚必錢四十萬麥五百斛凡有以將其惻隠之發者是即郭范也已此乾父坤母厥初生民之本心仁人君子有戚戚焉若斧若堂雲横烟冪胡君得所欲也夫九亰有所感也夫仁人君子有令名也夫送馬貴權江州徳化主簿序不冒貨廉也不倖爵尢廉也今天下真廉固不少亦有矯為廉以要人爵者且冒貨者有懲而倖爵者無沮彼有所懲而不為此無所沮而不處也非廉之尤而何吾見廉士罕見尤廉者則尤罕故丞相馬公之猶子貴權君尤廉之一也至大庚戌君嘗州教授秩滿與君有雅故者適柄用欲擢君而忘君名之下一字則以上一字為君名任太常寺太祝君不就遂調江州徳化簿以歸其冬郊太常掲姓名召執其事則君南歸久矣偉哉凡今遏義命捐廉耻冰須塵面伺候公卿之門皇皇然惟爵之倖者聞君之風可以少愧矣且今之臨民者不徒朘民之膏以為飱且蹙民之力以為梯君有倚雲之梯而不躡其肻以民為梯乎不以為梯肻以為餐乎徳化之民何其幸也君將之官不鄙徵言君度越如此而予何言雖然按志江州治徳化而濂溪周元公故宅距城十里元公初為分寧主簿有獄久不決一訊立辨衆口交稱之凡居是官者所當師仰也元公率性備徳廉特其一爾故黄太史云溪名不足以對茂叔之美今君旣尤廉矣居元公之官未逺元公之世而又近元公之居為政精宻嚴恕務盡道理亦景行之而已廬山雖高可企而齊濂溪雖清可澄而匹也他時金聲玉振一府皆傾厖臣碩輔如吕政獻趙清獻者薦之朝畀使者節君當就勿辭送畢敬甫序千里民社之寄重矣經畫教令歴閱簡書所以佐夫任民社之寄者豈輕哉幸而司牧賢也民嚴之若師保懐之若父母也清映氷雪明侔水鑑也而幕僚又賢則九重徳澤速於置郵列城皆然而天下治平矣其或作牧者徇私忘公利已病民民孰敢與争是非敢與爭是非者獨幕僚爾必幕僚賢也彼雖欲徇私病民也十事或四五沮勿使下則民亦職有利哉否則淪胥以鋪千里阱擭如矣然則經歴之設繫政之臧否民之休戚顧不重歟若畢君敬甫來為饒幕長蓋饒民尤以為幸也君清絶請托明照蠧弊軫民一本衷惻三載未嘗少渝於初其解紱也無有不願其留惜其去者徳興去府逺士民以事接於府者鮮而惓惓若此何歟詩云民之秉彛好是懿徳敬甫所以感觸其性天者豈徒然哉唐史稱畢搆脩潔獨行治術為最天子有璽書袍帶之賜今聖主登庸賢輔將開平治必拔俊良敬甫官箴幕辯彰灼如此佩盛美以往授官益崇庇民益廣而邑士民顧欲歛恵於千里圖其專不圖其咸予知其不可也他日士來告曰民齎咨涕洟欲借留不可得也士則能為歌詩道願留者之心而洩其思也詩旣若干首矣子宜序年月日序送徐文節鷹房提領之黄州序予方休官絶肉思與世外隠君子游而宗人文節奉檄提領鷹房打捕之齊安求詩予不工詩則告之曰蘇文忠公方山子傳云方山子光黄間隠人也前在岐下見方山子從兩騎挾二矢鵲起於前使騎射之不獲方山子怒馬獨出一發得之蘇公落筆如畫方山子豪特不羣之態遂奕奕在人目睫公又謂光黄間多異人往往陽狂垢汙不可得而見傳末深致意焉何代不生才謂齊安今無斯人不可也夫隠人不在城市在林藪君以蒐獮林藪為職將必有所逢得若人焉肯從君游必能開君之見易君之識拓君之器而今所職掌不足以縻君矣予又聞前代聖王不貴熊羆虎貔故田而載渭濱之老我皇撫運聰明齊聖匹休姬文君儻見異人焉以姓名獻比於獻珍禽竒獸以為恭敬者何翅相千萬他時君欲逃薦賢之賞不可得今所職掌必不足以縻君矣予欽遲君故相語如此客有笑者曰子之言迂之甚者今夫詭遇獲禽者謂範我馳驅為迂不獵縣貆者又謂詭遇獲禽為迂人欲無涯凡仕今世者往往偭迂趨巧文節以鷹房打捕為職子乃語以不獮毛羽獮人物况見異人不可必子之言迂之甚者予俛而怍仰而歎曰詭遇獲禽吾不知不獵縣貆吾愈不知知而不告過矣不知而不告吾過易辭也予休官絶肉壹不知仕今世者之如此也客之言是則予言非矣雖然姑筆以授君儻見如方山子者出而就訂焉送董師文山長之齊山序山長董君將之齊山過予徵言夫齊山有長由前代以來為講明道義設也秦漢而下惟董子度越諸子正其誼不謀其利明其道不計其功兩語為後學法程夫道本有功義無不利然欲明正乎此乃謀計乎彼則人欲為主天理為客久之壹是人欲而天理忘矣故日用動静之間學問思辨之際俛焉孳孳惟道誼之為務而通塞得喪不入乎其心雖賢科方開程試之文必本仁義必尚忠孝又皆躬履乎是而非空言夫然故他日由學校出者必正人脩士而功利自足以及物此今昔設長之意君之任也按齊山或曰有十餘峯其高等故名或曰以齊映故名映碌碌得君他時冀復相乃掊斂以中帝欲藩鎮進銀大瓶高不過五尺而映獨八尺其為謀計如此使山果以映名君見山如見映以之内自省可也所思齊者其董子乎君為董子則為士者必見君而思齊矣君家有壽俊為道義表予欲效陳亢請異聞而未暇乃以君家所有贈君贅也予寡陋故也雖然諸峯齊等如是而止岱嵩衡華齊山莫與齊也人與山殊出乎其類拔乎其萃由一人之人為億人之人兆人之人在我而已秦漢而上孔子賢於堯舜誰謂聖逺厲其庶而安敢以醇儒畫君哉槃澗先生文集序宋文章不及唐唐專門多宋惟六一南豐半山二蘇數人而已以文粹比文鑑可見矣然則五星聚奎無乃不驗乎易曰天下文明又曰觀乎人文以化成天下所謂文者禮樂書詩易與夫記事之史是也明者人無不習而粲然日用常行間所謂化成也周程繼孔孟朱子集大成聖經賢傳自漢以來穿鑿傅㑹為之一洗若掲日月宋之所以度越漢唐斷斷在此摛章繪句云乎哉善論文者莫如南豐謂自唐虞以來至秦漢之際異人殊世其文數萬而其所發明更相表裏猶一人之說理當故無二也然則文明而天下化成者其不以此乎後之作文者篇為新說說有新語然觀者不足以畜徳習者遂至於喪志此則建洛之所斥者吾鄉從考亭者三君子而槃澗先生董公猶丑章也其五世孫槃集公文二十卷示予予受而讀之其所發明相表裏者揆朱子猶一人之說也三十年來新說新語益衆甚者詆訾建洛天啓聖明科舉用朱氏四書他經兼用伊川胡蔡氏可謂得成化之本矣公之文遂彰明於世乎欲升朱子之堂而入其室者此猶牖户也雖然知行盡其性得失付之命不患得而習之不旣得而違之然後文明而化成可冀也不然口耳以徼利逹意趣不過符讀書城南則學為何事學者於天下何補其偭考亭甚矣豈聖天子表章之意哉旣以語槃槃拱而請曰幸筆集端繼今讀斯集當益有味不獨槃也送董季真入建刋蔡氏書傳通釋序故鄉先生深山董公壯老劬書筆著甚夥孝經註及九峯蔡氏書傳通釋其尢盡心者令子季真旣走建陽刋孝經註小學快覩矣他日復欲往刋書傳通釋過予徵言當深山著通釋時科舉未復士壯者遷業幼者束書嬉敖深山獨兀兀風櫺雪案邊若無與於世者詎意聖神首出文運丕開命習書者用蔡傳哉昔蜀山人知明日客來消息深山豈亦預知今日開文消息邪予方倦筆墨坐客亦謂季真得意再往先民所慎予跋涉數百里徒手資諸人事未可知季真色不怡予曰盍筮之筮之遇蠱巽下艮上之巽巽下巽上幹父之蠱用譽幹而致譽吉矣蠱互兌震兌金卦震木卦金從木鋟梓象也巽互兌離兌講習離文明傳習象也巽九五曰貞吉悔亡无不利无初有終先庚三日後庚三日吉无初謂著書時有終謂際今日且後嵗丁巳又三嵗庚申又三嵗癸亥所謂先後庚者是三科四方學者吾邑友朋或季真必有資通釋取高科者蓋子之先君子究心此書若先知之今易又告矣於是坐客相與臨䇿而歎咸曰亟往勿疑予乃録其辭為序送汪子中序聖朝建學設科務得真儒臻善治上嘉虞周下陋漢唐丕休哉千載一遇也如陽春布濩隂崖氷谷荄粒無不翹達於是予弟之女之夫汪子中以嚴君仕於京師往省焉且階以學於國學行有日予重告曰四十年來人指金臺為速化地往往慕題柱棄繻之為甫級分寸則傲桑梓棄糟糠若此者未出門而先疚於其心未報國而先害於其家也今子中之往將學於國學則其志念決不類此予聞無為小人儒之謂真儒先自治而後治人之謂善治物未格知未至人之所以為人者百未究一二其敢曰真儒善治邪厥今命教胄子俱第一流人所以教者予不敢躐越而談然傳習居三省之一則弟子事也南軒子張予曰習之有斷絶者心有以害之也心過難防一萌於中而習之功已不續矣旨哉言乎學者效先覺之所為以碩師而傳以心為嚴師而習庶乎君子儒哉其於治人必有補矣子中學篤倫明業精行成日想慈闈之嗟季復辭嚴侍以南征使邑人改視曰國學造士有如此者信可為後秀之準程豈止閭里之榮而已子中勉旃送董仲縝序前代千里之生殺予奪繫乎守守據案操筆吏常離立不敢視百里亦然故擇官而郡縣治今則官與吏參決擇官不擇吏不可官少而吏繁雖慎擇欲其盡才且良難哉天開聖明路府州縣秀才生員充吏此平治大機要也儒生顧惜終身畏法尚義受財鬻獄必大減少又土田市井風俗利害非其少長之所聞則其鄉先生長者之所告一旦出而佐賢守令之設施専慮畢力蠲民瘼之所急不待旁諏熟察而後決郡縣之治不猶運之掌乎吏者官之臂指得良吏則力省而治最賢守令將汲汲焉吾知秀才生員無留良矣吾邑仲縝董君省檄在路吏伍中予知其良也君有母末疾沈痼家貧甘旨藥石無缺如是者有年疾愈人謂孝感去年春邑經理田糧専官每畆加步七十君田糧最少控於朝廷差來官止令百姓自實供報夫事親孝見義勇為為一邑長利非賢何哉君他美甚衆如復初菴書院養士田皆彰灼在人耳目者一日過予言曰僕雖在吏檄中然日聞求補吏者坌集上之人得無厭薄乎進退當何如予曰良吏乃賢守所汲汲也予固言之矣今郡侯之賢聞於東南士民惟恐一日大用不得歛恵兹土子曰居是邦事其大夫之賢者况恭上命而相助為理此亦君所宜汲汲也乃叙以送之從而歌之曰吾侯之公兮水鏡同兮今子不往後將誰逢兮吾侯之偉兮顔范比兮今子不往後將誰事兮氷食葛製子慎毖兮風積霄摶予欽遲兮送李易仲石洞山長序古贈言者躬行之助而非口說之諛後世蔚文新語而已易仲李君為石洞長將行徵言辭不獲則思石洞學者昉得新貢士為之師師在温故知新不在記問予為易仲得標準焉豈無他人莫延平先生若也延平如氷壺秋月瑩徹無瑕考亭從先生游自謂每一去復來則所得必益超絶知新之積成已裕人有如此者然延平未嘗為講解文字其言曰讀書者知其所言莫非吾事而即吾身以求之則凡聖賢所至而吾所未至者皆可勉而進也延平之所以為延平上承河洛下開考亭者在此後世儒者吹文義之毛而染功利之指天理其冠服人欲其鞶囊者可與延平同日語乎四書所以藥凡愚為聖賢然口耳者猶之未嚥而吐卒未能效天啓聖明進士業先四書自漢唐以來未有然為士者身履之以輔世長民則可筆傳之以譁衆取榮則不可雙峯先生不踐場屋今科舉先四書則士者不當自外場屋朱子云非是科舉累人自是人累科舉此一言可深省也條儒先之說以收科而異時賄政市獄無以異於刀筆之仕者豈惟累科舉且累四書矣易仲粹整沈篤前瞻延平可謂有其質者也肄與人同簡而行不與世俗同條學與衆同方而達必與聖賢同域凛氷壺於塵窖皎秋月於暗室果能此道豈止於石洞有光而已西洲詩集序西洲胡君少有詩名東南長而中州鉅公如盧疎齋姚牧菴皆翹企譽贊其得意處落筆數百千言不休如河決海運横放亡極惟盛唐時高適岑參諸人筆力閎贍有此君宜頡頏其間下視郊島寒澁跼步顧影不足道也予嘗論詩自漢魏以降大抵沉浸乎山樞蟋蟀其托物引興以紓長懐寄永慨皆祖離騷蓋變小雅之遺聲也謝安石階庭言詩遏舉楊栁依依以對而安石謂不若訏謨定命逺猶辰告安石之志在廣哉熙熙乎曲而有直體者或者反謂遏為得則非矣又降而唐晚束字五七而雕飾無遺巧於是楊栁依依之遺聲乃復盡散而雅幾乎絶賴唐杜氏韓氏詩行世不冺宋黄山谷陳簡齋曽茶山振微引墜式克至於今日數十年來何地何人不詩若以五七言珠穿綺簇莫能相尚獨西洲君雅麗汪濊如千載一人歌庶幾廣哉熙熙氣象並時者乃始辟易君自謂以選為骨而其高處若不相似予疑君别有根極他日君過予曰僕嗜吟甚不可解於心然謝艮齋有一言為文人無足觀矣未嘗不三復斯言以詩人名豈吾志哉予為竦然敬畏信君詩文之外所造深矣如是則合志安石以邁刪前孰禦何但高岑之與倫余湘甫宜庵序余湘甫星談而市隠號宜庵今年將築宜庵端齋王先生旣諗人以其槩兾多助矣湘甫復徵予言予謂湘甫號宜庵何謂也湘甫曰僕鈎簾坐肆客常滿各語以所宜夫金火剛而水木柔攙槍惡而景星善人禀得其偏而不能矯則害於而身是故剛者語以宜柔柔者語以宜剛惡者語以宜善善者語以宜勿為柔善他皆類此至若長民者宜恵愛執憲者宜明慎躁進者宜徐狂馳者宜静富宜勿歛怨貧宜勿過求子宜孝婦宜順兄弟宜友僕躔星度命觀所禀受審所趨向拳拳語之此所謂宜也若僕之所宜僕不自知也世非弓冶工不可世不耒耜農不可家無十金之儲商又不可昔者嘗吏於縣矣人比之倚市門秣驛廐惡乎可是以在此不知宜否也予聞之竦然曰子之不知乃真知也古人誦往聖道術者不在朝廷必在卜數之中此宋忠賈誼所以一遇其人而忽然自失也天地曠曠物之熙熙或安或危莫知居之子居甚宜又居人以所宜其號宜庵不亦宜乎人宜多助築庵以居子予方宿春逺役雖羞澁姑為之倡云白雲察罕平章賜白氏序賜姓命氏其來自古平章白雲公才猷超卓聖天子眷禮優隆因公告老賜白為氏自今至於永世自一身至萬子孫昭受寵錫河山帶礪苗裔永存丕休哉此人臣非常之遇也中外名公卿大夫士詩而序之旣詳矣僉事黎君介景君來言曰子名能文辭者此獨無言不可予辭不獲命而繹夫子涅而不緇不曰白乎之指而言曰天下之物幹革羽毛絲縷未有涅而不緇者涅而不緇唯玉而已是故玉之貴舉世無以加君子於玉比徳焉乃今聖天子賜公白氏豈非以玉比徳而使其子孫世世不可涅緇也哉予聞公處通顯如韋布一旦致為臣而歸凌雲抱月遺埃壒之溷濁舉凡天下之汚無足以凂公者昔唐白太傅清修忠諒為元和名臣光耀簡冊今白雲公清修同其退又同白傅不得専美其受氏也可謂榮且稱矣雖然此家法也自今以往子子孫孫必也繩武紹徳清白以傳家精白以承君然後不負賜氏之意不墜受氏之美一或涅緇則非白玉之白非白玉之白則白斯下矣由是觀之公之受氏可謂榮且稱而公之子孫可不勉歟黎君要予言夫言不足以禆世教雖工無益故云爾然揚聖天子丕顯休命以勉其子孫者亦豈非公之志也乎贈又元吳君序新安吳君孔亨以相字名江西四十年定猶豫決吉凶成敗蓍龜有不及蓋易卦深幾兆芒微不若孔亨之言明白而易知也夫物生而後有象象而後有滋滋而後有數人作一字象也有所闕不成某字有所増可成某字筆訛乃類某字滋也由是吉凶成敗出焉數也又六書有指事有㑹意有假借此字問某事指事也視其缺與其可増㑹意也筆訛因假借矣子觀孔亨相字大要不外此但孔亨聰悟絶人鋒銛機熟人不及也然此不過程邈王次仲字秦漢以下字爾若籀文若科斗若鳥跡不知何以相之厥今綸綍揚廷符印它官白麻黄牒爛然天書在諸字之右予語孔亨此字敢相不孔亨曰子前所言得吾相字之麤爾世間萬法不出隂陽五行以字畫求之從則上陽而下隂衡則左陽而古隂方平為土曲直為木流動為水横斜而銳者金上騰而銳者火來客有陬隅日辰有休王吾以此相之若籀若科斗若鳥跡皆可而此何不可所不可者一代聖作絶出古今草茅賤士訾相之則罪也予答然愧君言疎齋盧公號君又𤣥由今觀之揚子雲識竒字比參隂陽六甲故𤣥孔亨相古今字究測隂陽五行故又𤣥疎齋真知孔亨者哉君徵言因書以贈送劉君序聖天子開億載太平設科蒐真儒興善治六合詠仁萬世誦聖猗歟盛哉丁巳秋試士如制士歡欣距躍上饒劉君自謙之子埜踵門言曰家君宦役湖海命埜守閭今者母命之曰汝曽祖擢上第汝祖預鄉貢世為儒家宜就舉圖襲世美埜居行將焉從敢決於先生予曰試士詔書也子又重以母命子之母其聞陶孟之風而興起者哉世科宜繼世徳宜懋世業宜修徳懋業修科未有不可繼者子之母其屬子也不淺矣予聞子之家在長川大谷之中英秀清淑之氣磅礴鬱積異甚子之曽大父大父收科䇿名雖其材越軼儔類亦其地靈發洩然也數十年鬱而未洩安知收科䇿名不在子子往勿疑往而捷明年對天庭分天職予之告子又當有進乎此者送董禮存信州儒學教授詩序禮存董君教授廣信儒學君先為初庵書院長邑人士嘗坐講下故為歌詩餞君俾予序所以洪惟聖朝興學崇化思得真儒致善治匹休三代賢科先子朱子四書道至隆也昔子朱子倡道南方難疑答問具集中唯君家宗老槃澗先生穎悟渙然最為高弟君今日泮黌所授受必原昔日雲谷所講明木鐸載揚如久閉之雷坯封皆驚久旱之霖焦巻皆榮此予所以為廣信之士喜也矧君號禮存禮安所存豈不在視聽言動間乎夫四者之不敢忽以正身也未及正人也然卒之身正而人莫不從者蓋天理人心之所同有倡之斯應道之斯行矣此予所以尢為廣信之士喜也然禮存有要道子朱子答槃澗書有曰敬之一字近方見得伊洛拈出真是聖賢端的要妙工夫只於此著實用工不患不入聖賢之域旨哉言乎此非禮之所由以存者乎此君家宗老親傳第一義君應為學者言予不應為君言然四十年來贈言者例尚竒新語若此者指為陳言腐說更詆訾之此子朱子之學所以晦而聖道之所以不明不行也孰知陳言之為精義腐說之有妙味故雖君家所有而予敢更贈焉庶幾廣信之士知精義妙味之可喜則說樂將自此不厭而非徒喜也廣信號英俊所聚義理之宅紹興大魁汪公則子朱子畏友紹定大魁徐公又子朱子門人陳君文蔚高弟徐巖巉絶之境鵝湖清幽之濱必有樂綂緒之學而人不及知者儻肯為君一出其於君之家傳當有不符節而合者則君之喜又當倍於廣信之士之喜也嗚呼真儒善治非口耳筆舌可及也聖明之思治切矣教授之官守治矣尚勉旃哉詩凡若干首是為序送彭皆春序廬陵彭皆春純明篤實君子也扁其齋曰寓橘齋史公書之君最為雪樓程公所賞識然蓬轉於廣右海南北邕管兩江之間得一冷官如獲石田今又萍寄豫章將歸廬陵上章貢靡騁靡定而冉冉老矣客或笑曰君寧終身寓邪名之不可苟也其有今日宜也予曰不然人在宇宙間皆寓也而彭祖乃以久特聞人暫而彭祖久君之寓不有羨於此哉今之靳君者豈不以軒冕之來之晚乎夫軒冕外物之寓乎身也者其來不可却其去不可止不我寓而彊求之於是有負乗而致寇錫帶而三褫者曽是足以為榮乎人有至榮者寓而人弗之省也何也心為郛郭而性寓其中所謂天爵良貴也顔子三月不違所以存此也而身則寄於陋巷原憲克伐怨欲不行懼其汨此也而身則托之環堵二人者終身未嘗軒冕而日月千古其榮無以加焉又安知皆春之寓不有羨於此哉形寓於宇宙流行坎止委順而已性寓於心日問主人翁在不此往聖來哲之望而區區為皆春願之者也異時行方如愚之回壽若久特之祖則君之名齋豈不兩得之也客語塞乃次其語客者為序贈徐義翁北行序虞上下庠夏東西序殷左右學周東膠虞庠皆大小學並建漢擇年十八以上者充博士弟子唐州縣學限年十四以上十九以下而小學無聞宋三舍法行而小學一皆肄簡家塾而已皇元興學崇化陋漢唐追三代外臺勉勵倣古八嵗入小學十五入大學皆訓導之自皇慶以來東南學校誦弦聲風動雷隠矣不休哉然勞倍則功倍勞半則功半逸則罔功者唯今之訓導為然不徒譊譊而已視其眉睫而閑其鴻鵠將至之心如羈騰猿如馭奔驥稍縱則敗羣圯類有矣其視唐宋倚席者唯評其詞藝之高下其優劇相去不亦逺哉初外臺擬訓導滿三嵗與正長旣不果行省擬與諭録又不亟嗟夫倡而不和教而不行未必不由此也此提學者之憂而予末如之何也已予所不得已於言者臨川徐義翁職龍興路學訓導滿三嵗弟子以蒙入者以聦出以鈍入者以銳出其功如此其勞可知矣乃不得被半紙之授霑斗食之禄則慷慨欲北行或曰今朝廷方重名爵義翁之行遇合未可知爾予獨以為不然夫器玉者純於玉則碈知其賤不免於用碈則山石皆待沽矣食功者止於梓匠則路人知其不與不免於饜路人則毁瓦畫墁皆求飽矣今義翁其材玉也其功梓匠也任選舉者不用義翁將器碈而食路人乎非所以重名爵也其必不然明矣其用義翁必矣雖欲勿用珩璜琚瑀尋引規矩其舍諸延祐己未三月甲申送鄭大使之廣東序廉訪使即漢刺史職也漢王陽為益州刺史行部至邛郲九折坂歎曰奉先人遺體奈何數乗此險竟以病去及王尊為刺史至坂叱其馭曰驅之王陽為孝子王尊為忠臣予以為叱馭是也王陽旣為刺史將指行部謀身可哉予所為評其是不者方今庾嶺南談者以為偏且逺風氣異中州仕者不欲往往者又欲不久居故於其職業無憂且勤之心由是民俗日益荒陋倘有賢刺史如王尊者忘其身不怠其職為朝廷剪虵鱷之暴横均雨露之偏枯易其荒陋納諸良馴此誠南粤大幸也予耳目所接者廣東廉訪使者如王陽以病去者多而叱馭者少官吏積玩赤子或為龍虵朝廷乃命河南行省左右司郎中鄭公為使甦息存全之唯公慷慨直前不以偏且逺為疑也夫其恭上命如此軫逺民如此祝融海若效祥介祉必矣而何火堆炎嶠之足憂哉或又言風氣與中州亦不甚異食有海之百物果有丹茘黄蕉花有素馨山丹其人少爭訟喜游樂使者無以南粤視之則嘉政美俗與江東西閩浙不異自公此行始矣送張伯高郎中紹興路總管序江廣地方數千里出鎮者貴戚近臣政令惟元僚得可否之至於和如鹽梅諧如宫商相臣之名美而逺邇迓衡元僚之志展而丞庶蒙澤若此豈易能哉予讀左傳國語見鄭公孫僑凡貴卿顯諸侯獨能開導調揉使底於道意後世未必有繼之者來江西昉得伯高張公公持平守正審情切事中於時病合於人心予非彊附之古人蓋今人旣弗及矣雖然言出而人孚者必行孚於人者也公孫僑曰君子長國家者非無賄之患而無令名之難伯高從事斯語蓋久毫饋縷謁揮斥户外以故上而敬下而順雖有牴牾卒皆信從若此豈易能哉異時雍容廊廟訏謨定命逺猶辰告吾知齊賢士遜輩不足為伯高匹也公被璽書牧㑹稽行有日兩道官吏士民愁蹙失據而相臣尢戀惜之昌黎送陸歙州曰歛此大恵兮施於一州今其去矣胡不為留似為今日發然予謂人之戀公者猶負暄者之戀冬日也方暘谷初升光景下燭則牆隈舍畔有私其燠者倐然正中遐邇畢照則向之私其燠者亦無不被焉江廣㑹稽猶牆舍畔也冬日之愛旣先曝而美矣他日公訏謨廊廟尚得與六合八荒同此美曝而安用齎咨涕洟為哉公之行也俱士為歌詩以著去思而謂某曰予盍序其所以不得辭陳文穆收堂序三代而上書不多而聖賢多三代而下六經諸子百家梓刻日傳萬紙書不少而聖賢少夫何故收書者貯之庫笥而不貯之虚靈之府神明之舍故書自書人自人此大患也饒康山陳氏宋初獻書一監賜號清白處士後嗣子孫決科預薦世為清門收書益富陳君文穆之尊翁扁堂曰收而又以名君之子於是江東西名人勝士題辭賦詩美之甚衆復扳予言予謂書載聖賢之言行為多孟子曰誦堯之言行堯之行是堯而已矣此言豈欺我哉中庸論學而知之者以博學為先則書非兼收不可以篤行為要則徒收烏乎可予嘗陋李淑邯鄲圖書十志五十七類而其所以訓子孫者曰汝曹善承之世守之毋為勢奪毋為賄遷噫豈有博學篤行明彊之君子而可以勢與賄遷奪其書者不飭之以其本而防其末如李氏之云書直玩物爾嗚呼恡矣昔彭世昌謁考亭問所為來曰象山書院陸先生不曽藏書此來為求書考亭曰緊要書能消得幾卷何必役於物此言真有味予老矣不喜為無益之言因君扳予言不覺傾寫及此此以三代人物期陳君父子也豈不得其所欲也夫豈以予言為厲已也夫送陳質夫察院書吏序若稽古漢陳咸以劾石顯聞唐陳公以斥廬杞聞宋陳瓘以彈蔡京聞指佞觸邪一姓擅之為宇宙瑞物盛哉任風憲者可不企齊而况有媯之後乎陳君質夫行介潔而材敏達從事湖南北江西憲治風軌卓然選陟為察院從事六察之柄得玉雪其躬者佐持之斯宜稱矣江南自孫吳來中間自為國前後垂五百年其材非不多然躋世小康亦無幾爾豈物衆地大平治之不易哉聖朝奄甸東南分三行省而一行臺董正之其嚴且重可知也江南之望平治者獨盻盻焉於此又可知也年來冠豸乗驄極天下選人謂鶚横秋鳳鳴陽凡所建明若重名爵澄吏籍令人耳目蘇醒質夫此時執簡泚筆以先後之如王良造父駕輕車就夷途而飛黄騕褭為之驂服也積日月厲操行一旦有官守言責於子康慶復瑩中三君子有光必矣君行有日學校朋游為歌詩送之而虚卷端以告之曰子宜序予知質夫久雅欲薦君家所有以為祝規不復辭寛居胡先生文集序辭所以析理辭修而理明是以謂之文也後乃有追琢組繡以為工者未若四十年來詭經反理鈎棘斷續罵譏調笑之甚也予於江西凡三至慨此久矣若寛居先生之文雅麗光潔激昂曲折理未嘗不亘其間蓋卓然獨異於並時名能文者之文也夫萬形皆有弊而况空言苟無理以本之欲其不朽得乎先生之文族婣旣鋟傳之其外孫羅君扳予題辭予謂不求人知而求天知不求同俗而求同理此先生四十年超然異於人者如愚喜拙綂緒在焉先生賦之此天理融一之驗謂斯集不長留儒林文苑余弗信也送李粲然崇仁丞序聖天子設科擢用海内孝弟忠信文學之士嵗戊午康山李君粲然中其科調撫州崇仁丞蓋自漢至唐宋無不以廷對入官為榮雖尉簿凡刺牧無不興為禮恵利足以及民禄足以逮事育故榮也今頒禄不如古往往空乏其身事涉興利除害官長洎典案牘者輒能拂亂吾所欲為雖苦心志無益他日以事詣府吏摩以肩不顧揖庭立與府史無辨督賦役懼失期㑹則勞筋骨餓體膚無不有矣方李君未收科時饘粥之養魚菽之祭可無外求味先聖之遺言探六藝之微㫖有以足其樂於已乃今一旦去士君子之林而夷於府史之間捨自肆之安而踐乎拘迫之地若此者其足以為榮邪雖然此孟子所謂増益其所不能而異時勝大任者也子夏曰仕而優則學先儒謂當其事者必先有以盡其事而後及其餘予願君暫息乎其已能者而勤乎丞之職業身雖空乏而毫饋縷謁絶之益嚴興利除害彼雖拂亂吾所為吾終不相與得罪於民寧勞筋骨餓體膚而不使失期㑹夫如是則榮雖不足藉而辱旣逺矣天理不可冺公論未嘗瘖錐穎呈露聲實流聞而大任於君乎屬必也夫市獄賄政搰泥揚波四目四聰電視霆怒故設官取士為蒼生一洗之李君可不欽承乎哉唐循吏李素立蒙高祖恩顧特異有司擬雍州司户帝曰要而不清改擬秘書郎帝曰清而不要乃授侍御史後竟封侯此循吏大任之踵武今日之不足於榮者安知異時不赫赫於天下後世乎送方方山教諭序邑教諭方山方君専席五年偶予入湖北憲幕校文江西繼又提舉江西儒學未嘗得從容接緒言也予方致其事而歸則代君者至而君且謁選去矣廣文官冷而邑學尤冷惟講學為宜書言惟斆學半予不知君自程督何如然望眉睫比五年前益和粹篤實且教鄉邑甚不易能使雅人勝友爭為詩以惜其去則講習之相悅可知矣君去此必為正長古者仕而學學而仕相為無窮其學也非章句誦說之謂其仕也非富貴利逹之謂立人達人學即仕也尊美屏惡仕即學也由正長至郡博士非有獄訟求情察辭之勞可以大肆其力於學學進矣仕未進猶進也仕進矣學之進者未至焉猶未進也昔乾淳間方公崧卿由教授越州後累秉麾節葉水心稱其博於儒而以吏得民此仕學兩進之模楷方山君尚企齊哉異時再望眉睫尚得以學古之疑仕今之難質於君而賀君之進也重贈董仲縝序董仲縝初奉省檄補府佐吏也予序贈之詳焉不意小却補州佐史三年未嘗箠楚塵埃間非廉勤疇克爾州乃復舉之府斯舉也可謂不蔽賢州名人勝士詩引筍束俱以介潔材賢稱又可謂賢賢也昌黎謂下不求其上上不顧其下故高材多戚戚之窮盛位無赫赫之光予尚惜其論未大也苟温飽則不戚戚矣豈下求其上之志哉獨范史贊王龔能推士曰士進則世收其器賢用則人獻其能能獻旣已厚其功器收亦理兼天下其利傳而人莫之先豈同折枝為長者以不為為難乎此言真有味也予評仲縝孝似召南不謀利似仲舒彊直似宣能計䇿似昭能獻替似允不特府佐史之器也前太守失於舉用當是時殆同於折枝而不為也然猶可誘曰試其文未試其行今歴試而無不可昭昭矣按王龔為汝南太守好才愛士首舉黄叔度陳仲舉袁奉高獨叔度不屈仲舉後至公輔汝南亦司空太尉以功名終盛位有赫赫之光莫汝南最故併為今太守願之不特為仲縝靳一顧也仲縝將需次於府與客訪予林下將筆此重贈客曰仲縝文儒今秋賦在即子不作之使與鶚書乃贊之使參鶩行子何說以解衆惑邪予曰王諶有言山澤不必有異士異士不必在山澤試之場屋者言也試之官府者事也夙夜之學疇昔之志傾寫於數刻之試而胷中未嘗有一日效官之備也政體諏於吏可不視其僚自受爵之日為學製之始比於試官府者固若駕輕車馳康莊矣禮曰儒以道得民要在均之以道得民爾班史傳循吏六人龔遂召信臣明經甲科而文翁朱邑皆郡太守史後世豈有優劣之者哉客語塞因並著語客者為贈云送汪子磐山長序歙為江左名城汪氏為歙甲族宋炎紹間汪氏秉鈞持樞者接武盛哉蓋黄山秀竒甲天下其靈異英特之氣磅礴鬱積鍾毓如此汪君子磐先大父高文邃學芥拾科第而弗克顯融融在子磐父子不疑也君來長初庵書院凡七年齋榻幽獨簞食瓢飲晏如為文務去陳言劬書劇嗜炙模模範範學者無間言一旦代者至由是而官吏部由是而第奉常蓋七年者其學之嵗月而自今日已往皆仕之嵗月也雖然古之學而仕仕而學如車兩輪不容缺一方其學也非章句誦說而已修齊治平之本禮樂刑政之經觀其㑹通所以仕也及其仕也非富貴利達而已去就進退之節經綸參贊之業時措從宜所以學也若夫學焉而以入仕固今日所不免惟其得之也遂以為旣足而不復知古者之仕而學或知學矣而所學又非古人之所謂學是以植立之卑成就之陋雖貴窮人爵而不足以副蒼生之望厭士大夫之心也然則振起山川之消歇張皇紱冕之缺絶第一等爵雖不可必第一等人在我而已學而仕仕而學古之學者何為古之仕者何施在子磐加之意而已君之解組也邑名人勝士爭為歌詩寓懐賢惜别之意而予拙不能詩姑繹古人學而仕仕而學之㫖以致切偲之助儻不以陳言視之又以其仕之嵗月為學之嵗月則君之所至其可量也哉太原族譜序太原族譜者王君聚翁所作也王以爵為氏虞媯殷子周姬之後皆有王氏而瑯琊太原之王則周靈王太子晋子宗恭之後也其後僑居江左族尤碩蕃今譜斷自歙來徳興者為始祖而繫之太原者著始祖之所自出也禮曰尊祖故敬宗敬宗故收族古有大宗以收族今宗法弛猶賴譜可以收族也人之言曰宗法弛故族不可收以予觀之所謂弛者特無采地之入以世世合食序昭穆而已其異邦來徙居者即所謂别子為祖者也其長子則繼别為宗者也長子之長子世世承之所謂宗子所謂百世不遷之宗也或宗子而無子則族人當擇近屬昭穆相應者不論貧富以之承宗而共宗之宗子沒則族人皆為齊衰三月如古禮可也其始來此邦之祖伊川程子則以立春祭之必宗子而後得祭以予觀之斯祭也族人皆不可不與不可怍於豺獺也莫若三月上旬筮日即墓而祭族人畢集因序昭穆或宗子之力弗及則族人協力具饌而宗子主之胙必均於貧不能具者如此亦足以尊祖敬宗收族矣若小宗則自斬衰而盡於緦麻今之五服之内是也蓋去始祖世數旣逺則不必有小宗四也予平生最病蘇明允族譜引曰無服則親盡親盡則情盡情盡則喜不慶憂不弔則塗人也又申之曰至於塗人者勢也勢吾無如之何也斯言也兒童熟諸其口往往視族人無服者若塗人為當然矣此大不可也譜引又曰唐長史味道刺眉州卒官一子留眉眉之有蘇氏自此始而譜不及者親盡也曾不思此所謂别子為祖子孫百世承之今不特祭不行而譜且不及可乎民吾同胞情可盡於族人乎親可盡於始祖乎今太原族譜出蘇譜逺甚其大宗可考而知也欲植宗法在舉而措之爾王氏自鹿鳴先生以詩禮傳家可齊公又參扣朱吕二公遂悟朱子全盡心體之微㫖為能蛻俗學而探聖傳文獻相承至今弗墜故聚軒君修譜體道君貽書以序引屬予其惇族厚俗之意亹亹不能自已可謂賢也已嗟夫如蠻如髦我是用憂學而不知道者且不免而况流俗之蚩蚩乎風雨如晦雞鳴不已二王君可謂豪傑猶興者豈無聞王君之風而興起者哉人人親其親長其長予因王君於斯世尚有望也不欲以無益之言塞請乃揆夫尊祖敬宗收族可行於今者而併著蘇氏之失使覽者得詳焉其於惇族厚俗或小補云信州路邁珠總管刋陳古靈諭俗文序人之有生雖與物同而四端萬善根於心則與物異或肆情恣欲失其恒性則是天形我以人而我物之也人無以異於物則民彛大冺亂矣帝興王起設官以為民極政欲使斯民率人之道而異於物爾然所以為人之道各具其人之身故曰君子以人治人改而止者教行則刑不用也世逺官媮牧民者惟簿書期㑹以為大故及陷於罪則稽法律以治之豈所謂以人治人者哉廣信總管簡齋公慨然念彛倫之斁不可不叙舊俗之汙不可不新取古靈陳公諭俗文暢闡而警教之以人治人其言反復諄悉可謂得新民美俗之機要矣紹熙庚戌朱文公守漳州嘗刋此以諭其州民簡齋公系出高昌地相逺世相後行乎東南若合符節先儒謂四海之逺此心同此理同千古聖賢未嘗異者豈不信哉矧上饒號稱賢俊所聚義禮之宅扶植遺緒為後生法豈無若徐斯逺韓仲止趙昌父其人今幸得賢師帥警教於其上興仁興讓從今日月冀矣豈但簡齋公匹休朱夫子於此邦有無窮之聞無疆之教思而已哉送彭幼元贊府序幼元彭君丞徳興清標出俗能幹絶羣邑人士揚推美實謠來暮而歌去思渠渠娓娓謂君不負丞至元以來未有也恭惟聖天子越度百王合徳堯舜思得真儒臻至治以孔曾思孟暢闡堯舜禹授受心法俾大漠流沙之外皆得通習而舉任之自有載籍以來未有予忝校文庶幾得不負天子不負所學者今幼元不負丞非不負天子不負所學不能也予評幼元不負丞崔斯立未免負丞何故幼元任理與長官爭可否棘棘不苟同文書行必當理然後涉筆署苟不當署吏睨曰當署幼元鞭之矣斯立一躡敝跡日哦二松間直尸素爾雖然崔斯立未免負丞自謂不負故度越之易也陸敬輿不負所學誠不負故企齊之不易也唐賢宰相多矣獨敬輿者胡致堂推為洙泗之徒真西山斷其有宰相之學惟其所學醇正淵浩故其正已格君謀國用人如發敖倉以賙貧乏如決江河以灌下濕沛然無不足也幼元知企齊之不易而向往步趨之不置豈有不及者哉相天下與丞一邑位雖不同而理同窮理者為學之要任理者為政之本吾知有理而已壓之以丘山而身不屈戰之以虎兕而色不變而况宫室妻妾所識窮乏者之瑣瑣哉此不負所學之大端也不負所學斯不負天子矣四十年來東南士或消聲林藪或未忘爵禄然材學兼茂者亦無有幾人故東南之人望日以輕予甚病之今幸科目搜真儒使得敬輿一二輩則科目重人望丘山東南増氣矣故凡以科第奮者予同一欽遲而尢在幼元也幼元之解組也旣過予别他日以書來曰先生不容無以教之故以尤欽遲者勉焉尚不使予為空言也哉送徐方塘上林簿尉序曾南豐言南越偏且逺與中國通已千餘年而風俗尚陋葢吏者莫致其治教之意此論誠然然以予評之豈獨吏之非賢哉自唐以來猶未免鄙夷其地守令以遷謫往者十六七幸而得韓退之栁子厚則陽山栁州幸甚而不皆二公也非遷謫往者則東西二大府自辟除視情分之昵疎而賢不或不暇擇故居官者大率苟且無憂且勤之心所以入中國千數百年而其俗尚陋也皇元奄甸東南五嶺南無復遷謫往者三嵗則擇胷中有氷鑑者涖以御史擇人而授命旣下則給驛以遣此事度越百王聖人能以天下為一家皇元無閒然矣延祐己未外銓而同姓叔父方塘公以欽州教授轉而簿尉上林公學邃材高幾於君子之不器而不得實用聞命下汎然不為喜聞嶺南風土之異漠然不以為憂聖賢用則行先民老益壯公兼有之昌黎所謂真知輕重大丈夫者公其人矣聖朝所以化民善俗者得公真不負也然則為越人洗其陋俗而同於嶺北其事出千餘年之表在公此行斯越人之幸也夫公之行恒所往來者皆為歌詩餞行而明善猥不能詩故為之序以賀越人云爾芳谷集巻上
