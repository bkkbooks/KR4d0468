body:
  text: 芳谷集卷下元徐明善撰說朱明叟字說朱明叟求字說於余按古文明字從日今文從冏並見說文冏小明也然秦漢以來多從冏蓋失其義久矣天地間大明者日也月星本無光得日乃光爾人體性天地心譬日也目譬月星也目雖待日月與火而實由乎心故曰胸中正則眸子瞭焉又曰心不在焉視而不見非虛語也日恆明食之自外者月也心恆明食之自外者口體也余嘗中夜以興澄慮內照逺而千載大而四海微而户內之煩攘無不見也可謂至明至妙者矣貴勿食之而已叟勉之耐閒說閒音間余友黃君聖可號耐閒求說於余余曰天行健君子以自彊不息君顧我我揖君坐語甫一刻天行四千九百餘里聖人察焉故惜分隂君以閒自命不可請更之君曰吾所謂閒不汲汲於富貴利逹云爾子姑聽乎方少時欲芥拾科第曉倚忩夜讀燈不敢頃刻閒也既已薦於鄉當試禮部惴惴然文墨不足雄其閒勞益甚方是時為士者皆然不意科輟吾思場屋之文於天下國家無補幸甚休其勞而凡士者又往往不堪其閒有去而技術鳴者有去而賈取贏者有去而結綬於刀筆輦金於縱橫者是數者吾皆不願獨匡坐蓬蒿環堵之中隤然而已所謂耐閒如此豫乃改容謝君曰當世之士得見耐閒者可矣先儒謂科目設而聖賢之學微今科目輟而聖賢之學益微人欲無涯異徑同壑富貴利逹之情不以科目有無為增損也而聖賢統緒不泯絶無幾矣使凡士者在今日皆如君則斯道猶有望也雖然耐其次也耐久而樂上也豫聞內重則見外之輕德深則見誘之小既以彼為不當汲汲已則閒為已真適奚耐之足云他日訪君東湖隨栁傍花幸為我賦閒中之樂張伯大字說碩之義大也在詩専言碩其詁則大也兼言碩大則碩以貌言詁曰狀貌佼好也大以德言詁曰德美廣博也人貌有碩不碩然人異於物一人足以當兆物雖不碩猶碩也至於德則其大不可為量在擴而充之故有億人之人兆人之人所謂大人也寅齊張公名其令子曰碩字曰伯大不鄙命余以字之說余不敏嘗聞南豐曾公云人皆欲善其名字而不皆善其行特假借以稱道云爾不誠乎身莫大焉今公父子自為師友孳孳聖賢善其名字者必非假借云也其命余以字之說豈欲縯繹訓詁稱道而已哉夫貌所以著德也德所以充貌也大學曰在明明德明之又明以至於充實光輝所謂大也晬面盎背山立揚休所謂碩也佼好不足云也然德之大也有要趙文子晉之世家也既冠遍見諸卿大夫乞言焉范文子告以古者德既成又聽於民誦諫獻詩風言考事盡戒之術也趙武歸見張孟而語之孟曰從范叔之教可以大由是觀之先民有言不自大則大其弗信矣乎余於伯大未見顔色然辱愛於張公有加不欲其為千人之人萬人之人而足也故誦所聞如此伯大有取焉他日望其眉睫而知其碩大無朋也已霜筠說為羅益堅作晉人謂羅君華荆楚之材豫以禹貢考之荆楚之材竹其一也物適於人用謂之材人適於世用謂之人材今石林董公以霜筠為羅君别號者蓋以有用之材待君也豫家故多竹工取材焉必再霜三霜者蓋竹之材在筠筠之堅在霜非但以其不改柯易葉於霜也竹之材甚美而用無不周十二筒用之律而度量衡由此起孤竹隂竹孫竹用之樂篾席笋席用之朝燕籩簋用之宗廟篚筐用之聘享簜用之符節笴用之軍旅而簡用之文字其用莫重焉其功莫巨焉凡皆以筠也士何可以不如筠哉自科廢三十年榮念摧落亦既如筠之霜矣或者遂荒其有用之學而暴其材如或知爾則何以哉况人中處乎兩間凡職分所當為者禮樂制度服器無不繫焉必也殺青所載皆考其故而究其極一旦當事在迎刃而解若破竹然如此則不特荆楚之材而天下之材矣亦猶筠之美於東南而材於天下也羅君之先君子材高而不及用其大用將在君君來徵言豫聞晉人愛竹清談云爾若器用大備措則正施則行此禮記者論筠本指故揚榷其說贈焉亦淇澳切磋之義也札法榮甫字說榮甫札法君以字行久矣一日求字說於豫豫謂世之榮其字者不獨君也夫所為榮其字者豈不欲好爵以榮於身豐屋鼎食以榮於家衣錦晝行以榮於鄉且久榮而無辱乎一榮與一辱古今常相對余自兒時習聞此言唯君子處天下之至榮超然不與辱對夫何故仁義忠信樂善不倦而已矣故人爵之未從也則一鄉一國以及天下莫不尊仰之如王公及其人爵從之也則功在當時澤在後世名在信史百世而下聞者莫不興起無他榮之自外得者未免與辱為對獨自內得者其榮無對焉君勉乎哉君年及彊仕方陸沈臺屬避逺貴要敬狎賢士大夫忠信樂善蓋有之矣仁義可勉而進也昔韋宗見傉檀歎其明智敏識知五經之表復自有人以豫觀君殆庶幾乎然則君之榮其字雖與人同而他日之榮於身於家於鄉必有超然獨異於人者矣葉志道字說道惡在人是也人與道不相離凡而事育交際飲食作息皆是也而必曰志於道者終身由之而不知者兆物之物物之人爾匪徒知之又求合乎道之所自出者兆人之人所謂人之人也人而不得謂之人之人惡可已故尚志志之所鄉窮山巨海不能限鋭兵精甲不能禦自不恥惡衣惡食始至飯疏飲水曲肱而樂終焉用之則手代天工身代天事不用則退藏於密此志竟成時葉君名志道字士心廉訪李公為更今字名即字至當歸一而今而後君自謂志道是尋常提起時篤由內也人謂君志道是倉卒喚醒時勵由外也真積力久心即道道即心無所事志而千人之人萬人之人不足以待子矣雖然大道甚夷旁有欲歧什伯其人顛倒相追走疾獲多招子並馳子不人同人謂子癡子行敻敻道逺渴飢人有盈色子或忸怩此時志帥勿棄鼓旗聖有明訓差之毫釐朂子貞心聽我苦辭子思無邪以車伾伾梅林說為曹仁傑作梅比於人其絶德者歟凡濟人者必有實語以梅林而三軍無渴是則名可以濟人求諸近古郭令公傳呼免胄而逺人羅拜司馬公邵先生居洛而為不善者恐二公知之蓋其大忠倬行孚格逺邇故能如此唯梅似之矣且物以多為貴者少則不足觀以少為貴者多則不足揚獨梅也一枝半樹則見者如遇巢由不覺屈膝至於繁華照昊縹眇無際則又如清白滿朝媚於天子瑞慶開而光霽長也實既佳而名有補少可喜而多不厭然則梅比於人真絶德者矣曹君號梅林求贈言夫託於梅者衆而君獨託於梅之林豈不好其實且尚其多邪雖然好尚不可以如是止也必君之好善如火必熱如水必寒如梅必酸則聞君名當有津津然者君之尚清白如梅特出千紅萬紫之上則或環堵離羣或天衢彚征人將愛慕瞻佇有不容已者夫徵言將以畜德則空言無補對君梅林當有愧色乃為說朂君願實其所好尚有美實必有令名梅雖絶德吾遲君矣學而時習說學之事大學之條目是也學之義則效先覺之所為而已其曰先覺自孔子言之堯舜禹湯文武周公是也自今學者言之堯舜以下書契以來凡嘉言善行可效法者皆是也而孔子集大成故後覺必效孔子而百聖云為舉在是矣人性皆善先覺所為無不善之雜由體逹用也學者效先覺之所為亦無不善之雜積久與先覺之性不殊因用明體也曰復其初者先覺後覺性本不殊今而後復如其稟受之初也夫子生知未嘗自謂生知故曰吾十有五而志於學曰不如丘之好學曰有顔回者好學與此章學字非有輕重差等也惟其效先覺之所為故不可以不時習如堯舜稽古我效之堯舜精一執中我效之堯舜親族察倫為古今治平之極我效之深造自得便是堯舜其間多少工程故朱子釋以學之不已又曰時時習之則所學者熟即夫子所謂學不厭不知老之將至也此一章學字該知字時習字該行字故朱子或問中說知行其實知在行先不知則無所據而迷所當行然行其所知大是切要故集注只說行曰效先覺之所為更引謝氏坐如尸立如齊以釋時習則學不在口耳而在躬行明矣程子謂學者將以行之是日可見之行而壯行在其中先覺行之我亦行之日至行熟則所學在我在我者知其固有知也是內外合一也是善已明初已復而成性存存也今人但以讀書考古今作文章為學有能一日用其力於先覺之所為者乎未之見也朱子之言聖人復起必不易之矣陳君立道語以所聞曰或曰時習者當其時則習其所當學謂八嵗十五春秋冬夏也求之不得吾心是何與聖人異㫖哉何以不曰時而學習之也近年辨朱者不一皆此類因立道之言及此書以諗之菊逸說春華似得時秋華似違世得時似軒冕違世似山林晉陶靖節見宋業漸隆不復出仕又甚愛菊故子周子云菊花之隱逸言菊似陶也人知靖節逍遙酣暢不為簪組所勞斯之謂逸然夫子列逸民首夷齊下聖人一等其品級甚高靖節夙志聖賢任重道逺在榮木一詩讀者當有省矣他如古人惜寸隂念此使人懼此意娓娓集中至謂宴安自逸嵗暮奚冀直與七月無逸相表裏此所以貞而不渝窮而愈堅下夷齊一等千載之下未易倫擬也程君以菊逸扁軒題賞既衆徵豫言豫念自靖節到今逸居蒔菊代豈無人而磨滅誰紀何哉希賢非自逸可能流芳百世決不但在黃花尊酒間也故以靖節警自逸者塞請後之君子必有取於斯言真文忠公禱雨說紫極王月潭師禱雨必雨其徒言師但危坐默存而已蓋積誠所感也豫寓紫極嘗為師舉西山真公怠愠矜三語欣然有悟屬豫抄以寄焉蓋吾之氣即天地之氣其禱雨也猶呵之必有潤也在誠通爾使禱者皆如真公行事者皆如師必雨宜也今之禱者未易語此而行事者不無徼利矜名之心如其俱怠固無感通之理苟含怒藴欲其心焦火則益以暵赫不亦宜乎或謂大旱有數存其間非禱可得若湯七年旱是也豫謂誠則必通然雖通也或雲不待簇而雨或雨而不澍或暫澍而繼以杲日卒不能有此之謂數邇者丙午丁未戊申豈不曰三年旱乎七年猶是也必曰非禱可得是人與天不相貫也公言雲蒸雨降從一念中流出豈欺我哉志先樞密施田真觀院志佛不耕食而受田人不耕食其田而施之佛何哉佛者之說曰上能祈國永寧次則而父以上法皆超度之又歸而檀越之名有瓜華梵貝之奉於寺不廢然則其報施之厚矣先樞密東湖居士施田真觀院者紹興四年公辭樞密思居後起守信州樂旁縣德興山川風俗之美由豫章東湖徙焉公母韓國黃夫人先忠愍公之室而太史文節公女兄也葬新建縣洪崖鄉大雲塘公念德興去墓之逺而墓距真觀近佛者之說豈不户牖夫孝而不得直遂者邪乃施田院中寓祠託墓意其報不薄也甫百年而院僧裂所施田以餉豪宦者由是祠亟徹塜宅蓬顆矣嗟夫使凡寺之報施類如此則誰肻施而佛之教何以振行於天下哉又數十年公七世孫明善嘉善元善來拜墓下低回院中念時享有家廟魂氣無不之祠何必此寓也又念先公之孝之施期於有永山川鬼神與聞之院僧而忘之乎公蓋世藐俗之氣而無憤悒於土中乎後之人而可已乎於是妥其所徹經紀封樹度僧義塤者屬之且鐫其田之見業於院者於石雖不幸蹙削繼得善護持者收其入以祝聖人壽於億載而先公之孝尚永垂云大德丁未嵗十月朔聚逺亭記德興山水甲旁州而聚逺亭據鹿阜最高勝處復甲德興幽人韻士几席其間有馭竒翼遊八表之意次則吟者得逸思於天末飲者擴醉鄉於世外至於永日娛遊雖暮色蒼然留不忍去則凡遊者莫不然矣蓋古之君子必有遊息之物高明之具古者長民未有不選勝於地同樂於人而兹邑又山川之美則亭宜不得廢也昔熙寧間余氏創樓單令名之樓圯而亭不知自何年至思陵又特賞蘇文忠公所題詩親灑宸翰下飾四方聞者莫不想至其處大德庚子亭燹幾半雖鹿阜形勝固在而亭不足以聚之則山川逺人而耳目陋矣是年冬令尹陳均仲寧來登覽慨然曰吾其可弗葺又明年乃卒葺之翼然如新成門垣徑級既繚既闢又命邑士倪均天倪購求自二蘇公而下詩之鑱於石而散逸者置亭壁如舊觀於是均即亭以休其暇日或領客命觴而邑人咸喜遊息之有其所也相與謁於明善曰願有記豫謂納鮮碧於一宇窮莽蒼於雙明此單令命扁意也豈復有說乎然牆面者憒如亭天衢者豁如景變乎外心動乎內何也逺者心之休也聚逺者內外合一之妙也本心廓然天無旁際而宇宙之廣山川之勝忽放目而盡得之外觀內體合一無間此遊人之所以有得於亭也然利害得喪一纍乎其內則逺者隔聚者離矣斯纍也有暫忘者有寡有者有無有者此又有得於亭者所以為高下淺深歟今之君子遊觀之樂鮮矣而選勝地同人樂又非俗吏之所為也乃今陳均一旦還二百三十餘年瓌偉之觀不惟於此開爽襟慮以清政源而又使邦人知國遺吏治民務以聚其所欲逺其所見休息而安樂之也豈非賢哉不可以無述遂為之記德興儒學記曠百世無真儒善治者官不知政而士不知學也學所以修已也學為已事則講學之所士者自圖焉可也而古聖人必設為庠序學校以教之學校不修國人以刺其上蓋官之政有在於是不可誃之士也官知政而士不知學則士有愧矣士知學而官不知政甚者役士以就其一切之政可乎欽惟有元宇亘坤載甫櫜干戈即興學校聖聖相承一是以作成存恤繕完為先此唐虞三代之政也漢高帝以馬上得天下歷惠文景三君至帝武始令天下立學校夫漢承秦弊學校所當汲汲者乃後之如此烏在其知政也然則今之士非千載一遇歟德興號稱多士而今佐蒞兹土者罔不欽承上㫖大德九年主簿錢處人既新禮殿而講堂獨以嵗月久書閣以枘鑿舛蠧圯斜傾聚辨弗宜至大二年丞東平陳得新環視慨然曰是豈不在我即捐俸肇役士歡趨之工良材攻腐更朽易於是圯者崇傾者正矣仰視上覆斯翼斯飛壯好若新成焉役始於至大二年正月戊申畢於九月乙巳又明年正月綸言洊頒勸飭彌渥而德興之士之學則已存恤繕完應書若陳均者其不謂之知政已乎然士之知學有當勉焉自統絶學散一轉而尚游說再轉而矜辭章王肅注學而時習之曰學者以時誦習之先儒嘗歎今學校僅有直誦而已周程繼孟朱子翼承然後人知效先覺之所為之謂學覺者體之所以立也為者用所以行也此善治之本也老莊言理而不及事覺而無為也管商言事而不及理為而無覺也是皆不足以善治至於一以誦辭習藝為事則體用俱廢又老莊管商之下爾是弊天下也凡此象服藴之儼然臨之在上曷匪先覺其所為可考而知也覺如先覺所為如先覺真儒善治舍我其誰哉此古聖人設庠序學校而聖朝作成本意也士既抃舞上恩來謁記以無忘丞之勤明善嘉陳均能知政於先乃著學之名義與士之所當知者於後威武祠記神者氣之伸者也惟義所在義得氣斯伸矣而死生不與存焉昔關雲長見襲於吕蒙不得全首領以佐漢然天下到于今廟雲長不廟吕蒙何也漢賊不兩立權臣於操則義在雲長故其氣伸而神也豫邑廟祀神董端公唐爵御史天佑中為八寨將首一日賊自浙來力戰乃自斷其首天為動威雷電晦冥如有戈甲旗麾甚盛賊乃潰走神挈其首以歸未至家墮馬死馬不復受他人廄䇿久之亦死里人念保疆奠民功不細也廟神於藕池旱潦札瘥禱輒應至宋崇寧丙戌幾二百年改作新廟神從六世孫博士衝為記事備記中又二十餘年當元至大辛亥里人江夢得重修西林祠堂蓋宋景定壬戌余思中江時所建久而敝也祠既飭夢得介博士從六世孫真卿來請記按唐宋番陽𨽻淮南時錢鏐據浙附朱溫久天祐四年溫篡唐改開化即拜鏐吳越王奉梁正朔羅隱諫鏐奈何交臂事賊為終古之羞不聽淮南節度使陽渥聞溫篡即傳檄興復淮南稱天祐凡十六年嗚呼番陽與浙地犬牙相入使番陽終始不知有梁封疆捍禦之臣其忠勞豈鮮哉正統裂矣神以正斃廟祀四百餘年望雲長殆庶幾乎或疑天不風雷於神未剄首之先雖動威走賊而無及於神之死是大不然人之氣即天地之塞也神以死捍賊則義氣沛然足以動夫天地之塞故風霆見異雖天所為而實神之所自為此神氣所以無非教也此神之所以能伸也神兄名全福以為人除蛟害水死今廟祀邑之銀港神從七世孫名端忠宋建炎辛亥提舉湖北常平以諭叛將解圍單行犯暑死今廟祀鼎州桃源之千人溪神名全禎曰威烈神君者漢三十八代天師仍私諡而致號者也豫既訂梗槩為記復為歌詩二首使歌以祀神其辭曰大盜竊國兮羣盜繁奔蜂流蟻兮闖我藩力不敵兮氣已吞峙如山兮不反騫剄大首兮言噩噩天晝晦兮風霆作靈旗翻兮𤣥戈爍盜崩殞兮不煩搏廟崇崇兮藕之水捍人患兮宜世祀嗟天不佑兮王室如毁神死疆兮莫可僂指馬猶戀主兮錢氏不恥事賊以生兮不如神死嵗四百兮宇宙方長祠煥儼兮像雄疆里無拘人兮來薦苾香不猶逺孫兮比蒸嘗風肅然兮祀者恂栗如聞蹄雹兮神歘然而下入巨人挺劍兮蛟血猶濕袍紫襜如兮常平疑立山川泄靈兮神食此堂旱降澍雨兮潦賓朝陽粳稻露積兮虎虺藏執拘厲鬼兮惠氣流行人欽事兮有求無斁我扳雲長兮用慰忠碧題跋陳激齊筆耕集前朝詞科得人最盛而激齊陳先生偶見遺豈其才次於人哉先生儲覽既富下筆不能自休雖不中其科朝廷猶畀近闕擬後擢盛代作人如此使天假之年當為名卿大夫科之利不利無與也而僅郡博士以沒豈非命哉然其筆耕集序有曰孝悌忠信吾之嘉種學問思辨吾之耘耨若遇不遇固猶嵗之有豐凶聽其在天者而已然則先生雖不為卿大夫豈有憾也其孫洪登搜纂遺文於兵燼之餘得若干篇示豫皆根柢理義暢逹明粹觀者可以畜德蓋乾道人文之盛類如此學之不可無統也文之不可無宗也是以論其世也洪登寶之胡浩軒正聲集浩然之氣人皆有之孟子善養爾今人知天地之氣乃吾氣者鮮故善養者尤鮮胡君以浩扁其軒可尚也然豫聞善養者特完而無害爾若鼓而作之務於蓋世陵物則非所謂盛大流行與天地相似者也君語及世人貪鄙淫邪即眥裂髮豎固知君浩然者形見不自制如此然天下之不仁方不勝疾聖人戒夫疾之已甚者已甚則吾氣先失其平也况彼將應之以亂邪不可不察也夫自反而縮道義充然聖賢各足其浩然之氣而已窮而在下友朋如彼必有內怍而止斯我化之也故無迹達而在上官曹如彼豈無望風而逝斯我正之也故不勞浩然之功用大矣君老益壯斯善養之驗方有當世志豫欽遲未已也因君示以大雅正聲輒書其後劉通甫吟稿詩莫工於唐唐詩工且多莫如劉氏夫束字十餘欲五色爛而八音諧未易能也而唐人能之劉氏又多能之異哉若希夷若商若長卿若言史皆精拔竒警膾炙衆口若得仁若滄若威若駕晚出亦皆流麗帖妥如香銷南國美人盡怨入東風芳草多後來者不得望塵焉况夢得沈著痛快雄渾老蒼為盛唐冠冕邪豫欲抄諸劉詩為一編供諷詠未暇也匆匆案牘邊閲通甫吟稿愁從蟋蟀聲中得秋向梧桐葉上知娓娓逼滄威矣嗜吟不已當與長卿輩並驅以望夢得不但如今日之所觀而已他時集諸劉詩當虛末卷以俟余文夫刋思齊箋注朱子蔡氏二書及詩集思齊先生游蔡門訂朱學所注感興詩及三問疏事精詳析理明盡先正許其有功斯文信哉至其自為詩清新麗艷則可並傳也梓本既毁諸孫文夫遍訪舊藏手抄之將復鋟梓永其傳可謂能念祖矣昔范馨留硯與其孫喬喬長執硯以泣人稱之若家集則心聲心畫在焉非硯比也姚察著漢書訓纂孫擬發明祖書舊義人賢之若感興三問則聖賢之統緒學之本末史之得失著焉非訓纂可倫也余氏祖孫相望於是過范姚氏逺矣雖然聿修厥德亦不外此何則思齊之所思考亭之所傳進德上機也文夫思思齊之所思方䇿以惠其人服膺以善其身豈不尤思齊之望哉詩曰繼序思不忘文夫其三復之舒雙峯文集雙峯舒公文見稱於平園行見許於考亭二公文行之宗也所以稱許之者而豈徒哉後學欲贊一辭則僭且贅其五世孫渺龍重刻梓傳之可以見公行修於家而詩書之澤逺也近比之士一於竒晉語曰竒生怪怪生無常是故世道與俱然未有能自拔而返之古者豫每見乾淳間文字不覺竦然况斯人斯文為兩公之所稱許者乎湖濱隱士藝忩李君墓銘後豫讀湖濱隱士志銘知其致孝可以移忠知其義讓可以平政厚俗矣今之仕者其制行或無是也隱士少屈折為世用人將有所賴乃終於辟世如此豫恨不交隱士而見其子娟秀特出有以得隱之微焉昔荷蓧丈人避世於藝也既以四體不勤五穀不分為不可則夫二子者必日相從於藝然後可顧乃逸之於家而使於賓客之事則其平居訓授必有出於藝之外者夫可使與賓客言是亦行其義也子路長幼君臣之論殆欲因目擊者勉之爾隱士之託於藝有合乎此矣若夫東湖今雖荒汙猶名四方以南州高士宅焉故也自漢至今幾世幾年士之不仕而家其濱者幾人高士豈有死後餘力可以斥之而卒不得以自附也至宋昉一灌者立下風爾今隱士之神情上與春秋之藝者相綴接則分席其濱庶無訾乎升師紀過集升上人詩文成集題曰紀過豫言佛書以大語高語散語低語喜語狂語閒語歌語别離語利害語如是凡六十四種謂之口業上人所著皆是語也其斯之謂過歟豫觀唐宋以來詩僧所作與騷人墨客無辨今上人突兀自是叢林筆墨此為不盡變其學雖不能無過所謂薄乎云爾者也或曰過雖薄不如無過紀之則日增其過不如勿紀豫謂凡有言即涉六十四種欲不涉六十四種當無言佛以言為贅龎而經論充棟何也無言佛且不能况學佛者乎豫家東湖公特重可師外家山谷特愛洪師今上人日增其過使句法響撼視洪與可無不及或少過之將江湖名勝爭先紀録豫庶幾觀過加愛重焉若夫解脫六十四種獨領空妙此祖佛付授師當為人言人不當為師言且非微言本意故不言吳昭德族譜吳姬姓以國氏昭德君譜其家世自太伯而下八十四世為昭德之子旭美哉彼葛氏出葛伯刁氏出豎刁聞人出少正卯其子孫見此譜得不竦然有所羡哉雖然稱其家之難吾知其有甚於他氏者矣德或薄人將曰如至德何取或傷廉人將曰如三讓何此有善雖大毫末也太伯之後宜然也此有過雖小丘山也太伯之後不得然也古稱盛世必百世祀非特源深而流長政在自葉而流根雖纍百世可必也詩曰無念爾祖聿修厥德此昭德譜家世昭子孫之意豈引之冠其編首以門第自矜而已進賢縣復學租王文公云古人事一職豈肯苟然為之今不苟然者不多見也古之師職教今之師職養養與教俱不苟然尤難叔志萬君教諭進賢革學田隱沒攬撲之弊學計頓贏碑穹然詩囷如也可謂不苟然已今夫食士不當自謀也然必養士者為之謀可也養士者又不謀以士之食食夫為姦為欺者寧使士朝不食夕不食其過豈特苟而已哉不仁甚矣雖然不苟然義也所以能不苟然勇也人固有見義而無勇者騷心蒿目而卒無所誰何或奮然而起靡然而止者是也然則君之勞烈又不特苟然者愧君也豈非賢哉憲僉郝子明樂壽縣去思碑頌德政者至父母神明而極然或要名矯情則愷悌於彼而恝然於此明清於前而懵然於後者有矣必心誠求之斯謂父母正直而一斯謂神明兼之者難哉燕山郝公子明僉江西憲事疾惡如惡惡臭不斥去不慊也列城士民無不徯公咨諏以為快所至貪冒落膽姦詐失魄咸稱神明豫既信其非要名矯情者一日出示宰樂壽時邑人所樹碑則又娓娓曰父母豫未敢雷同信之徐而得公建白二事大德丙午夏大饑官以米貸民期十月輸之倉既秋而禾不登價視貸時貴一倍堪輸者倍差吏徵急民悔且泣曰不如殍之愈也公建言俾明年冬輸之倉於是民乃破涕解顔如更得貸一也東湖者豫章城中水所溺也湖溢則濱湖之家有沈竈者丙午冬官議濬湖然不思江高於湖湖可濬而深斗門不可闕而下也闕而下則江反入湖不闕而下則湖之泄盡斗門而止爾雖濬之九仞江漲高則湖溢自若也是冬無禾蔬薪倍貴令下計工數十萬民皇駭不知所為公力白主者罷之脫數十萬人風雪泥淖之苦二也二事公不自言豫欲徵樂之稱父母者不虛故具爾此可謂若保赤子者也嗟夫父母神明美稱也然固忠國庇民者職分當然爾不父母將立而視其死乎不神明將廢耳目之用乎然且要名矯情者不多見况如郝公者乎安得百子駿吾於子明亦云子明由樂壽為御史擢江西能使所居官大宜然李幼成經史辨疑經史有疑求諸心心有疑斷諸理洪範曰思曰睿睿作聖思純乎理者聖也何疑之有哉學者苟能主敬以治心使心與理一真積力久虛等宇宙靈侔蓍龜不昧如日月則雖時殊世隔書闕文殘亦貫之以吾心之睿聖而已故經史雖有疑而我無疑也昔者夫子去堯舜夏商逺矣而刪定繁作凡斯文悉整比之豈諉耳目之官哉今之學者誦習而已不足言也務探討者可尚已然所通患者特無持敬之小心故無任理之遜志其譁世蓋人之意既如浮雲之障太空矣於是管見臆說出其間自以為不疑乃所以滋人之大疑此可重歎也李君幼成抄示所著經史辨疑數十條往往十得六七夫人誦習而君探討探討而不謬於是非使持敬任理之功有加無已詎可量哉先儒謂待自家長一格時見得又别君是編他日豈無改評更定者乎冷東齊義役規約豫里居時父老為豫言疇昔吾邑絃誦相聞大抵皆世胄儒先家也編户居其間十才三四爾官儒户憚衙前荒其待舉之業編户又喜得官儒户之助而從役也輕故德興義役最先成石碑可考也方是時字民者皆學道愛人之士豈有嗜利如餓豺狼而不可以義事者哉至元丁丑義莊田沒入官而差役之苦大異疇昔數年來又有大異者守令民父母也曩者民事之唯謹今則餌之訐之視為兩造而等威夷矣體膚父母遺也曩者笞杖自中户以上寧死不受今則凥高呼謷習之不戚而羞惡泯矣若此者自某里某人始而其資業完然其當役油油然於是東西家子弟皆曰彼能是而我乃不能是何哉科舉廢矣珥筆可也學校具文矣衙前可也吾身非青紫楦矣彼官人也不免箠楚於吾何有此時雖欲聯以義役將不能矣曾子曰民散久矣以汚吏治散民鄉舉里選不復學校名存實亡上不以義使下下不以義事上不知後當何如也吾子識之朅來江右獲觀東齊冷先生義役規約周密備具一皆德興數十年前舊規也豈惟東齊急義苦心能庇其鄉人必鄉人樂義者衆官清吏好不同他縣故也所聞里父老之言豈盡信也哉然東齊講畫之嵗實至元甲午於今一紀矣而推行未也何歟抑有故歟尚亟行之使里父老之言終不信可也千户王恭甫詠史并百將詩古者寓兵於農寓將於鄉後世文事武備分而詩書禮樂之帥不多見愈下而披堅執鋭者賤毛錐操觚弄翰者卑挽彊非豪傑特起之士不兼能也而王君恭甫兼能可尚已君家世將旄韜略之暇尊經訂史前代之是非得失良將之成謀勝算覽蓄既富從而詩之蓋六義之賦非月露風雲刻琢無用之空言比也夫胸中有甲兵者可以將目空千古心睎百將者可以盡護諸將如君宜築壇而拜也爵以世踐或者以為屈矣雖然聖神撫運天豫太平烽熄塵消六合清晏假為大將亦不過投壺雅歌而已爾然則君之孜孜書程娓娓吟課夫豈有用不極其材之歎乎又安知無采詩者獻於上拔卿於將參錯玉堂金馬間相與鳴國家之盛乎樟隱書院題詠古之隱者非苟然也其統緒之學經濟之具既備於其身或不得其時則山林巖穴適吾適焉是之謂隱及得時行義則上享其慶下蒙其澤矣若夫箕踞壺觴笑歌游衍不羡圭組者自晉宋以下其稽古用世之長望古之隱者瞪乎後爾號之散人可也號之隱則未也豫友李茂實示康山程君樟隱書院記詠徵言夫樟天下之名木也大而寢廟細而雕几無不宜也樟不求用而用之利博焉於吾所謂隱者協矣而程君又闢書院其側夫統緒之學經濟之具書無不備也野耕巖築一旦而開平治胸中素藴蔚然簡冊可讀而思矣時行則行伏荒幽泛遐渺往而不返者非也時止則止呌呼而求合納說而求用者尤非也足以兼善而安於獨善者吾見亦罕矣是所願於程君也勿比散木取諸樟勿為散人求諸書江古心帖葉高士以古調契古心得公心畫四十有六今雖有隋珠荆玉不足貴也公學有淵源文如江河自身死國墟游公門者乃敢詭道反理侮訕建洛廋辭隱語自以為竒而不知其陋也於是公門無傳人矣豫不識高士而識其弟子王月潭師有出塵追古意琴復精詣秋堂月寂聽者疑叔夜之不死也豫生庚戌月潭師少豫一嵗方得帖時師猶未生而能珍襲如此此人琴所以不俱亡歟惟儒之徒好畔而老之徒貴守故守者妍而畔者醜守者昌而畔者否月潭出帖未跋不覺及此後之覽者將必有感於斯姜起翁訪十五世祖墓及譜大宗法蓋古卿大夫之家有采地者也封建壞而大宗法不可復行東坡嘗恨有小宗法而世莫行然非有大宗法以承祀始祖百世不遷族人五世外皆合之宗子之家序以昭穆而但行小宗法則與今之五服何異盡於高祖而忘之矣愚竊謂與其講求廢亡不可復之法不若楙明賦畀不可易之理昔有生燕長楚老還故國厥或誑曰此汝先人之廬塜而哭泣不自禁者天理之呈露也所謂楙明者稽聖法察人倫而已矣詩曰行有死人尚或墐之疏者猶如此也又曰豈無他人不如我同姓而親踈别矣夫無情不如有情有情不如同形此以大君為宗子同天地之體性者也同形不如同姓同姓不如大小宗此以宗子為宗子同一人之身者也由分殊以推理一而所厚者不敢薄也真知愛其親而不厚其親之所出者無之此宗法之本也後有建舉而措之爾起翁以十五世祖為念是宗法廢於他人而不廢於起翁也起翁楙明此理故也豫以其徵記吾寧知之真文忠公薦介軒董先生奏檢子朱子之學若鄉邑董公叔重程公正思王公幼觀則見而知之若董公望之後學稱曰介軒先生者則聞而知之先生誨人必以規矩字人必為循良真文忠公褒薦如右有所譽者有所試矣士論莫不以先生見知真公為喜而亦莫不以先生用未極其學為恨也真公入而啓沃出而撫御一據大學其曰孜孜以求乎下而不敢俟人之求有未嘗識面而舉之者豈有見而不舉舉而不先者哉因思穆陵在位四十年用真魏諸賢則治用丁賈則漸不克終賈迄於僨國彼惟知有私門不知有朝廷天下知有桃李不知有楩楠杞梓惟趨附唯阿是崇是使豈虞覆敗之至此哉然則牘端數語國之所以廢興存亡繫焉誠千萬世之寶龜也先生孫竒翁以示後學徐明善敬記其後讀史要領裳有要衣有領然後服者便之自秦訖五代治亂千三百年具於史必有要領然後觀者便之也太虛一理形為萬物散為萬事合則治離則亂順則正悖則邪所謂要領者亦理而已豫友梅境翁為此書嵗有改評迄今乃定蓋理明故見確見確故辭確以史為案以理為斷信乎其得要領也此書若行豈獨通略纂運圖可束之高閣而已哉理之用為知人安民欲之行為內小人崇異端邇便佞古之治亂興衰未有不由此者翁既熟數之矣以備啓沃可也齊子莘故家大雅集故家大雅者齊君子莘之所集也自王迹熄而南國有騷正統微而江南有選厥後混一為唐宋然祖騷宗選到於今不異則故家在騷選之域宜也尚論騷選之人則屈與陶其最高乎屈之哀郢郢猶楚陶之賦歸世猶晉粵若前代則子朱子注楚辭湯文清公箋陶詩此故家之巨子傳人皓皓乎不可尚已更革後傾洞前何地無詩何人不詩巨子傳人我未多見其間𤣥思幽意排奡刻雕宛轉悽愴要亦可傳昔兩東門之未蕪芬流從兮椒榝亦異乎靈均矣湯公謂淵明說固窮多此深知陶者前之固不早後之固又豈足揚邪君集欲行後世宜不可以無辨舍是則蘭翹玉挺各稱其家惟君所擇可矣嗟夫賁若草木天命也化成天下人文也天命終古不息人文終古不墜儒者舍此何營文明以正正則不蕩不蕩則雅天命弗僭弗僭則無邪無邪則雅熄可光微可昌詩可不亡齊子莘昭代殊珍集昭代殊珍者齊君子莘之所集也君生龎裂而長混一樂逢昭代知文章將復大振故集此編也愚以大化賁草木觀之一陽初動梅粲粲蘭猗猗非不清幽特出然見亦罕矣青規將半紫艷烘霞紅香撲地素光奪月繡林錦野四望如一斯盛觀爾然牡丹富洛陽海棠麗成都一株獨樹此之所見必不彼若矧瓊華瑤草邪然則君此集急就不可也近取不可也昔荆公選唐詩其初人各如干首至李杜韓栁韋蘇州劉白不復去取禹錫所謂大振政此詩也或曰今聖天子以德行經術詞章采擢海內士子莘學博辭雄不待作中和樂職宣布詩然後光顯也鳥聲花影靡矣唐宋以此取士誠不切此集後當何如愚曰賦者詩之流詩者賦之源自康衢擊壤賡歌猗那清廟至於今不絶豈無故哉六律五聲八音治則雅忽則淫然而不可絶也須之久索之逺君必勉之黃秀伯所得邑人士詩卷人有萬世之長在形體之外豫求諸古魯臧武仲伐邾之役國人誦之可見矣齊晏平仲或曰不滿三尺楚葉公子高尢短小不勝衣然其謀言功烈皆信範天下後世蓋形者氣之聚或龎或陋所不可移心者理之㑹為上知大賢在我而已渝川黃君秀伯議論娓娓下筆不能自休蓋豪士也從邑大夫來寓邑人多稱之謂其得通介之中是又有為有守者其恆幹與三大夫相類彼夏之防風氏周之瞞新莽之巨無霸竟以其長大取顛隕者吾知黃君不羡矣然武仲以知聞平仲以力行聞子高以先見退讓聞所謂萬世之長者要在忘其外而致力其內焉爾故豫以三大夫謀言功烈期黃君君思齊焉誦其言行其行服其服是葉公晏子臧孫復出必不但作百里侯客也君得儒先生詩成卷來徵言豫雅不工詩乃識卷後以塞請東月師詩文儒者學到至處則其言益平近故百聖之言如出一口足以準天下範後世而未嘗多言學為佛者不然到悟處則其言益峻絶或出一語則悟一人由是汗漫不可涯涘其不同如此豫客江西東月師攜詩集謁豫頗采用文儒枝葉豫謂未若本色語自成一家師以為然他日遊武林來鄱陽出所作不特無假借善樹立而言語漸峻絶所到詎可量哉豫返林下六年欲聞平近之言不可得時取乾淳諸老文字諷誦有㑹心處而今世儒者政爾詆娸乾淳可歎也使豫不知平近之味而遽與峻絶之言接則今日見東月師不猶昌黎見大顛邪項氏野意吟藁邑外謂之郊郊外謂之牧牧外謂之野紛華之觀至此而絶曠逺之思至此而發故謀國於野則獲同人於野則亨張樂於野則流光其聲而况於吟意無俗牽句若神助宜也豫讀此集如久客城市目熟紈綺耳厭箏笛緇塵化衣乃一旦逍遙乎寬閒廣莫風行籟作自然好音而逺樵近牧又欵乃乎歸鴉落照間也比舊觀豈不霄壤哉朱文公云要使方寸中無一字世俗語言意思則其於詩不期高逺而自高逺此論與野意最相近蓋擊壤為詩之初故也豫未識君然見梅如見標格况詩揔好丹徒少府不笑後人寂寂矣崌嶺煙霞前村風月造物無盡意亦無盡有新作嗣以寄我項廷實編曾祖詩詞臨清居士有詩名江湖名勝時偕俊髦遍與之游嘗記明善七嵗時山房許先生來訪居士走價呼使拜許公公以乾坤萬里眼為題索二十字明善綴其左云織翠見高軒不愁書眼昏一亭共臨觀萬里豁乾坤許公大稱賞之詩云雙眸萬里乾坤豁五字殷勤當贈言擊甕未妨頌司馬垂髫遮莫賦高軒居士喜甚賜以紙筆今六十年矣居士與許公久為飛仙舊賦詩處軒亭亦非昔甚可慨也居士曾孫林輯居士詩集得四十首蓋林之生也後又當變革散落之餘所得止此而泣硯之意惓惓然居士名一鶚字宏甫又號嘉善既嗜善又樂人之善貌古而韻和魁然長者也林亹亹經術進未可量嘉善之報其在兹乎項廷實汝南類編廷實既編族譜又編嘉善居士詩詞又集古今項氏詩文與名賢詩文為項氏作者又自唐訖宋奉廷對貢禮闈補上庠者凡項氏若干人曰汝南類編夫編族譜追逺也編臨清詩詞念祖也至為此編則一姓之故實備矣廷實其亦有亢宗濟美之志哉項氏蕃於江浙之東然其著者唐則子遷宋則平父而已子遷不過詩揔好至平父然後史有佳傳然欲至平父必求之一姓故實之外可也平父所事者朱張呂陸皆繼孔孟之傳者所友者楊敬仲沈叔晦呂子約楊子直皆淵源鄒魯羽翼伊洛者今其書具在廷實讀其書企其人孶孳勉勉忽不自覺其為平父而類編不徒作矣項氏族譜歐陽公云士生於世莫知其所自出其異於禽獸者僅能識其父祖矣誦此語孰不凛然今廷實編項氏族譜本支粲然以别尊卑以傳子孫此為士者第一事有補世教大矣既自為序又録平菴譜叙於編首復徵豫言豫不能如范文正公復歸於范言慚矣然宋丞相西澗葉公本陳出也既貴朝廷恩贈及其本生父母近年鄉先達昌江文伯胡公亦朱出有訓族編訓其兩家子弟事見東澗湯文清公集中姑援此自恕而贅一言可乎今人皆知誦蘇老泉族譜引而少有誦其譜例序者不詳其譜例序之意而但誦其無服則親盡親盡則情盡情盡則視如途人則斯言也豈推而逺之也是薄為道也古之大宗族人宗之五世以外皆為齊衰三月袒免以外皆序昭穆而合食焉數十百世猶然後世宗法雖廢然一姓所居必有始祖其長房則大宗也其次房則小宗也視其譜粲然矣豈有服盡而可以途人視者乎盱江李先生曰祖以世斷逺則忘之族以服治疏則薄之骨肉或如行路吾病焉此語比老蘇為篤矣願與舊鄉尊雅味其語而勉焉董蘭皋段氏詩解曩嵗得廬陵段氏詩解於粥故書者其讐校精甚要領處必傍抹發明處必傍㸃皆㑹豫心且使豫無丹鉛之勞甚珍之他日揭復紙視所抄先賢詩則蘭皋董公筆知逸出經笥中無疑矣公用是經薦秋闈館東閣膏馥所丐皆收名有以哉方公經笥散逸時次子敬仲君尚幼已乃嗜學有聞知此書在豫戚戚然欲得之嗟夫世固有家藏萬卷一朝散棄無遺餘者又有初僅殘編斷簡已而聚連屋者皆人子孫之為也文運休明已然况堙塞不振時乎今之散棄者方來無涯也若敬仲君者斯謂鳳毛非止一家之瑞蓋鄉國天下之瑞矣兹事在統緒倫紀間非昌黎公畫卷比豫期敬仲甚逺乃以歸之而識其後嶽德敏書目隋嘉則殿書三十七萬卷唐宋官私無此也使年及志學者絶人事而讀之日二十卷至七十嵗可了其究為書癡不疑矣子朱子語彭世昌曰緊要書能消得幾卷豈非名言哉然則書無庸多蓄乎是不然書所以蓄德格致工夫無窮而書為最知言之學詖淫邪遁皆當覽而辨之所貴者自博反約耳蓄書在博蓄德在約博之則三十七萬卷可也約之則天地古今是謂道日用常行是謂學書筌蹄爾緊要書亦何有哉藏書之家不知反約蓄德而徒戒其子孫曰毋為勢奪毋為賄遷末矣世世蓄德世世蓄書德微而後書不可保李氏朝氏何莫不然今閲嶽氏書目知博矣徵經逺之德敏矣德敏知嗣德矣勿替引之子孫永保之俞學正文筆峯賦昔文正范公守饒病郡學狹陋乃眷城東得勝處則今學是也湖光冲融雙塔倒影堪輿家以筆峯硯池名之公不廢其言未基構而公徙守潤後守職方長侯乃克成之然探公徙學之意實以今學於游歌聚辨宜不専為弄筆徼利達也今學正月翁俞君帥正餘暇遊戲翰墨為文筆峯賦繼作者梅邊鄧君而下總若干篇皆極精綺俞君以示豫豫筆荒類不能賦獨念范公天章閣條陳天下事此筆可以開太平政事堂勾不才監司此筆可以澤蒼生筆之用莫大於此此後學所當師仰者然學內而筆外學正大則筆謹嚴橫渠張子少登公門喜談兵公責之曰名教可學何事於兵因勸讀中庸然則根柢統緒乃公所謂學其欲徙學於此正以平湖逺空可悟鳶飛魚躍於目前爾寺塔不猶雩壇乎淡津不猶沂水乎必筆峯硯池之似而後可以游歌聚辨也吾黨之士學問不足以彊志一氣而但以葩文藻語譁世取榮為務豈不猶吳興令夢人授五色筆嵗慆月邁衰颯不振又將夢郭景純索之以去矣可不懼哉因著所見賦後以諗同志且自勵云張氏爐塢記後爐者變化之具也自天地為爐造化為工幾世幾年陶漁化帝胥靡化弼龍漦化佚女簀尸化相國銅山化餓𨽻黥奴化將軍往者其略如此來者巧歷不能算大人不能占也又有挾炭游其間者其化尢速賈子曰合散消息安有常則倐忽變化未始有極誠知言哉瑤溪張君吾知其非挾炭者將聽造化之所為則亦渥丹化槁黟黑化皓而已爾雖然必有造化之工不能與者則豫嘗聞之若孔子鑄顔淵是也是爐也愚化明柔化彊鄙薄化寬厚凡狂化聖哲點雪無痕是成就處然自伊洛建安以來灰寒久矣君安得不委身是間自範以範人乎哉君抄前記寄豫徵言養吾先生猶謂不能增一筆而豫何言姑繹爐之名義致欽遲云爾野堂記詠後春者百昌萬有之命脉方寸者四端萬善之郛郭物囿於春人必超然有見可也吾人同此方寸何可使荆棘涉吾地哉然惟曠逺無私者能之非逼仄繫吝者所及也豫觀於朝市往往患得患失病夏畦者有矣利來利往亂方寸者有矣觀於野則有擊壤而歌滿懷皆春者有結廬而吟心逺地偏者在同人之彖曰同人於野亨子朱子曰謂曠逺亦無私也春無隱乎爾而蔽於私者不能見方寸我固有之而蔽於私者不能存野之義大矣哉友章程君搆堂而扁之以野樓曰見春燕居曰方寸地名殊而義則貫也彼決性命之情以叨富貴屑屑朝市者孰如君外觀發育內保夷平同於人而有以異於人乎哉豫幼往來乎君之里頗記洪巖㠣崌鷹鵠諸山竒矗秀出樵柯耕笠野意悠然今君飛甍厰宇既有以稱地靈發天趣而又闢孰肄簡諒求先進而從之蓋竹溪晉齊方寸之春柯葉於君而君方寸之春又將根柢乎子孫他日必有賦渭水空留月傅巖深鎖煙舉於野而亨於時者乃筆諸羣公記詠後以俟觀自在像諸佛法身有二種義一者真實二者權應真實者絶妙拘纍有感斯應體常湛然自在者真實之體也猶之聖書所謂安安所謂申夭如蓋無思無作而天下歸其慈悲矣彼學佛者苦行精修知幾何年得到如此地位此明道程夫子於觀音所以例敬歟自在未易摹寫兹像得龍眠筆意真實宛然是可珍也銘陳直翁墓志銘有篤學力行之君子曰陳公名友沅字直翁年七十五以卒其友饒君端可狀其言行授公之子養蒙來謁銘豫固辭饒君重告曰陳公雅知君君亦知陳公以學也能文章者豈無人得之未必慰陳公地下乃不復辭蓋真好學者之難得久矣太虛一理賦於人而流行於事物在人者必有以存之在事物者必有合焉可也讀書法聖賢則其存之合之也若易然此學之大㫖也公少長習舉子業最後聞石洞饒先生之高弟饒公公實講學西山虎溪之上不逺百里往拜焉饒公語以所得於石洞者公負受昂然推行勉勉然其動悟人莫測也自是不復名他師其用行大要但以質之鄉先達祕閣李公義山尚書陳公仲微而已饒公沒公為之申心喪三年其遺書寶之終身公逮事大父母曰孫善事我事父母無違禮喪以毁聞教弟友端自灑掃應對至成人以是恱其親為擇佳偶為更築爽塏均資産無毫髮欺與從兄二人聚居扶持急難娛適閒暇見者謂真同氣矣獻嵗迎長㑹拜以序族季春授規以祭墓宰木翦敗痛甚體膚竟以是觸暑控於有司得疾以至不起可謂孝友天至終身皇皇死而後已者也公居家條目整整月朔長幼必序拜旦必序揖為講小學書四書大義祠堂旦朔禮尤謹祭若見所祭者自承學饒公歸即行之五十四年如一日世篤斂儉至公尤苦嗜欲子弟無崇飲侈服雖幼孺無弛然晏寢者臧獲無為欺惰者蓋數十年前賢士大夫家猶鮮能及宜今之人歡以為難矣公延師不特為稚弟計屢為文㑹以激進族里居多穎出公講德之友皆碩學名人惠然肯來喜不自制質疑訂古之餘舉觴命釂或小車短櫂笑歌遊衍山砠水澨望之如仙可入圖繪每曰家居汨沒多憂患更無朋友之助缺損甚矣非篤信好學者不能及此言也公莊重而舒泰誠篤而坦夷其遏惡揚善憫窮急病之衷天德也養深守定山峙淵停使見之經濟必有被其澤者矣公以儒先生里居見大人無不就公諏政於救荒經略其利害隱然有所興除德佑乙亥里有乘時聚不逞掠鄰境者邑人搖心公毁家給民伍捍之卒渙其羣夷其首惡中州達人繼官是邦聞聲願交謁入驚坐詩書門户無替疇昔蓋忠信篤敬之效流俗皆曰非詭遇難免於今之世胡不視此歟公辛酉鄉貢程文有司驚異晚年筆墨更入古淡務理勝於辭詩一本性情宫商自韻平生造次不廢挾䇿其編纂成書有春秋輯傳讀易先師饒先生家集心開劄記正人文字惠明雅録各若干卷所著有講義詩文若干卷藏於家陳氏上世由臨汝徙豐城今為富州公三世居州之上方曾大父琬大父元勝父伯皋號西軒居士祖妣及妣俱曾氏居士一意迪公於學卒大其家其識有過人者公配胡氏有賢行先公二十五年卒繼孫氏子男二次養頤女三能靜能正能定楊允升周天山范淵德其壻靜正先公卒孫男四紘同森仍女二長適徐煌次幼公生於紹定癸巳五月歿於大德丁未七月屬纊明卓如平常曰吾事畢矣復何求乃逝維公令德稀年沒寧奚憾然長庚曉月遺老幾何悲夫饒君之狀公也詳矣猶曰厚德古道不可勝書夫非萬善不成全體非全體不名全歸公既謂學為何事則終日之間當何言行之不可書也故饒君之狀公非詳而豫之叙非略也公晚揭四迂座右若曰吾出話制事讀書取友寧迂爾嗟夫通塞利鈍晝夜晦明公既隤然處順而不駭異之矣何哉所謂迂者吾道非邪葬以卒之年十二月庚申墓在正信鄉東山之原銘曰道若大路世或謂迂多歧捷出飛走豈殊嶷嶷陳公徇人所否廣衷峩冠康莊徐後事功弗有時則我違德言既立洛叟同歸瞻彼東原雲暝月晝君子息焉云何再覯其書滿笥來學是資勒銘告幽迂友之辭毛耕道墓志銘大德八年秋毛君訪豫山中劇談曰用行舍藏唯孔顔有是爾然不用而求行舍之而不藏學者亦惡乎可吾藏久矣所自得者騷逺遊而無屈之悲詩逍遙而非莊之誕不専守環堵也况所至有巨人正學遺風餘思吾興起多矣故辛丑之匡廬拜白鹿朱祠憩淵明醉石壬寅至徐巖象山癸卯如鵝湖懷先儒聚講之盛山川靈異若仙巖龍虎因寓目焉今所為來者景賢堂張李二公攢眉國事處聚逺樓有二蘇詩何可無吾屐痕且不見子久蓋嵗庚辰始獲交君其談春秋不拘苛文密例豫所服其落筆衮衮無陳言豫所羡其詩清警穩鍊豫所不及然不知别來養深守定越軼流俗如此留二日送之自崖而返愧君多矣十年秋又訪豫洪都迎問曰為南州高士灌園翁來邪曰然明年將櫂武夷恨洙泗逺耳他日與之上滕王閣步龍沙以望西山有鼓枻而前者君長揖就舟去未知别離之可重也明年十一月君子鉉來拜且泣曰先君以七月辛巳棄諸孤卜葬永善鄉榴峯之下敢請銘悲夫君來洪意若起豫者而其時未可以速今將巾雲屨月追逐汗漫而君不吾待終愧君矣悲夫按毛氏姬姓國之後晉益州刺史璩來葬太末留者遂為郡人至宋而滂仕鄱從子公大愛其風土定居樂平之石溪為君九世祖曾祖杰好士樂施紹定辛卯大饑倒廩以賑部使者袁公甫奏官之祖鴻漸父天和妣某氏君諱疇字耕道生淳祐庚戌七嵗而孤九嵗能屬文其修潔出自天質如琅玕玉樹無塵土意至元己卯郡博士齊公夢龍亟招致中州名人無不異待檄教諭餘干至則禮宿儒徠俊秀教有程養不乏聲流甚美凡六年慨然曰可歸矣嘗扁其齊曰求心謂學之要在此又有寓屋郡城非其遊之月日則讀書其間要以胸腹為庫笥博而後約也遺藁詩為多歸舊居五日疾作將逝不亂曰吾如空中之雲翛然而已年五十八娶章氏先卒子男五鼎鉉彜遂良從老聃之役賓仲為他人後女二壻王振徐琳孫男二虎佛女一葬以卒之年十二月癸卯儒者常言學期有用至於獨善不得已爾是不然使有不得已者衡乎胸中是顔子之陋巷幽憂曽氏之風雩外假也如君之安於所遇庶幾見聖賢大意而豈易與俗人言哉銘曰彼放心於富貴利達之場此求心於塵埃渾濁之外或訾以為迂何足以知其內蓋遐睎夫不見知而不悔者邪斯銘昭之永不沫楚宫老人墓志銘老人張氏諱成高祖單州單父人生四子其仲名福始能植家聚族子五人次曰秀秀生深皆有隱德深夫人董氏三子長子用季子甲老人其中子也遭金末衰亂軍旅數起凡賦乘索卒相其兄畢力應令人不堪其難老人未嘗有憚色已而單受兵乃西遷曹州楚宫縣之楚宫居之家事承兄資雖饒未嘗問出入於其弟友愛尤篤性溫良夷坦不識詐諼詭薄其退讓若嗜欲有漢張叔長者之風終身不迹官府蓋其真淳不斫倫紀自合不待教而底善者也夫人郭氏官族子八人曰進曰珏曰德承務郎德興縣尹曰澤泗水務提領曰汝輔曰汝為曰汝弼曰榮晚又得庶子曰某伯氏無子以進承宗其季亦四男諸孫若干人駸駸事文學老人及見其子仕張氏遂為聞家粵自皇元一六合開太平中州人士攀附濳飛登踐華要於是百餘年間荒墟莽聚一旦豐屋相望駟馬高車相迹人往往歎羡謂世運適然爾以豫觀之艱難者興之符也疇昔艱難其先逢之矣惟艱故畏畏故善心生善心既純祥慶自下亦其理然爾若老人是也昔衛文公徙楚丘去滅絶幾何布衣帛冠卒為彊國老人兄弟以楚宫大不與是類邪是其適然邪老人以至元丙戌七月十九八十一卒郭氏後十有五年八十九卒葬楚宫三鄉朱博村同兆縣尹以從征伐得官以材任治民換文資其治德興多嘉政人畏愛之屬前進士余君龍光以汪君深所撰楚宫老人傳謁明善銘其墓明善民也不得辭銘曰奮難躍險心兢兢兮恭兄怡弟匪學能兮中平外直衆所程兮善慶不爽家勃興兮子貴孫蕃耄餘榮兮材良繼起詎不卿兮惟長者風在紹承兮我銘斯阡百世徵兮汪縣令墓志銘公汪氏諱標一名庭堅字國表歙為大州汪氏占籍十九簪組林立為聞家六世祖來家德興環溪為饒州人曾祖大異有隱德祖奬早卒父恭亨魁岸豪偉凡名士達人能溉益其子弟者無逺近傾下之築樓扁曰掇桂人號掇桂翁蓋先世有桂林者而掇取月中桂則徐公兢留題語也所以期其後者逺矣公生有異質史稱衛叔寶如玉人觀者傾都使公並時未知叔寶得専美否九嵗能屬文下筆衮衮不休十九入太學從叔父汪公復為博士授以文訣超然領悟雲蒸川流筆態橫生癸酉秋貢書題彰厥有常止翕受敷施命意謂天下方在君子福澤中又在聖人度量中主司驚異凡場屋荒速之文精警率如此登咸淳甲戌第授迪功郎隆興府南昌縣尉掇桂翁喜曰吾名樓不虛哉至元丙子郡將常侯福生籍郡歸朝廷侯與掇桂翁交莫逆也即上公名督府檄充德興縣闕事數月邑人方恃以安而東浙弗靖震鄰及躬公控闕歸扁其書室曰虛舟取養空而游之意潛心玩闕貫穿皆自得未嘗以示人也嵗乙酉郡闕員豫忝與公並公以書來曰漢歷惠闕學校宋至仁宗始詔天下立學今干戈闕墜盛美也古人不卑小官且朋友講習恱闕志乎哉於是分席凡三年其教躍如也闕俊秀彬彬皆公力也厥後集賢初菴傳公闕與齊公夢龍矜式來學不辭而就猶前意也然未滿嵗歸不復出則大肆力於羣書㑹心處輒抄纂巾箱充牣棐淨櫺疏賓送日月於庭户不知鬚髮之縞也耆舊久故釂觴論文繼日留夜春韶秋爽瘦笻輕楫夷猶山水間如是者餘二十年而終悲夫更二十年人何厭斁之有而造物者乃靳之邪公事掇桂翁生死無違妣故玉牒趙氏公實程氏出而趙夫人尢愛之家事諏闕芳谷集卷下
